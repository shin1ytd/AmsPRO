<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ams PRO v2.3</title>
<style>
:root{--bg:#f0f3f7;--bg2:#ffffff;--acc:#1a56db;--txt:#1a2133;--bdr:#dde3ec;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
#app{height:100vh;display:flex;flex-direction:column}
.login-bg{height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8f0fe 0%,#f0f3f7 50%)}
.login-box{width:360px;background:#fff;border-radius:12px;padding:30px;box-shadow:0 10px 25px rgba(0,0,0,.1)}
.fg{margin-bottom:15px}
.flbl{display:block;font-size:12px;font-weight:600;margin-bottom:5px}
.fi{width:100%;padding:10px;border:1px solid var(--bdr);border-radius:6px}
.btn{width:100%;padding:10px;border:none;border-radius:6px;background:var(--acc);color:#fff;font-weight:bold;cursor:pointer}
.btn:hover{background:#1e40af}
</style>
</head>
<body>
<div id="app"></div>

<script>
// --- DATA ---
const USERS = [
  {id:'u1',name:'有松 真一',role:'admin',pass:'password123'},
  {id:'u2',name:'宮田 憲治',role:'manager',pass:'password123'}
];

let STATE = { user: null, view: 'dashboard' };

// --- CORE ---
function login(){
  const uid = document.getElementById('l-user').value;
  const pwd = document.getElementById('l-pass').value;
  const user = USERS.find(u => u.id === uid && u.pass === pwd);
  
  if(user){
    STATE.user = user;
    render();
  } else {
    alert('ユーザーIDまたはパスワードが違います');
  }
}

function render(){
  const root = document.getElementById('app');
  if(!STATE.user){
    root.innerHTML = `
      <div class="login-bg">
        <div class="login-box">
          <h2 style="margin-bottom:20px;text-align:center">🔧 Ams PRO v2.3</h2>
          <div class="fg">
            <label class="flbl">ユーザー</label>
            <select class="fi" id="l-user">${USERS.map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select>
          </div>
          <div class="fg">
            <label class="flbl">パスワード</label>
            <input type="password" class="fi" id="l-pass" placeholder="パスワードを入力">
          </div>
          <button class="btn" onclick="login()">ログイン</button>
        </div>
      </div>`;
  } else {
    root.innerHTML = `<div style="padding:20px"><h1>ログイン成功</h1><p>ようこそ、${STATE.user.name}さん。</p><button onclick="location.reload()">ログアウト</button></div>`;
  }
}

render();
</script>
</body>
</html>
