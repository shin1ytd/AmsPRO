<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ams PRO v2.3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f3f7;--bg2:#ffffff;--bg3:#f5f7fa;--sur:#ffffff;--sur2:#f8f9fc;
  --bdr:#dde3ec;--bdr2:#b8c4d4;--txt:#1a2133;--txt2:#4a5872;--txt3:#8496ae;
  --acc:#1a56db;--acc2:#2563eb;--grn:#047857;--ylw:#b45309;--red:#b91c1c;
  --hp:#0e7490;--bp:#1a56db;
  --font:'Noto Sans JP',sans-serif;--mono:'JetBrains Mono',monospace;
  --r6:6px;--r8:8px;--r10:10px;--r12:12px;--r16:16px;
  --sh:0 4px 20px rgba(0,0,0,.09);--sh2:0 1px 6px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--txt);font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
button{cursor:pointer;font-family:var(--font)}
input,select,textarea{font-family:var(--font);outline:none;border:1px solid var(--bdr);border-radius:var(--r6);padding:6px 10px;transition:all .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(26,86,219,.1)}

#app{display:flex;height:100vh;overflow:hidden}
.sb{width:210px;min-width:210px;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;z-index:20;box-shadow:2px 0 10px rgba(0,0,0,.06)}
.sb-logo{padding:16px;border-bottom:1px solid var(--bdr);background:linear-gradient(135deg,#1a56db 0%,#1e40af 100%)}
.sb-logo .brand{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.5px}
.sb-logo .ver{font-size:9px;color:rgba(255,255,255,.65);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r8);font-size:13px;font-weight:500;color:var(--txt2);background:none;border:none;width:100%;text-align:left;transition:all .14s;position:relative}
.nav-btn:hover{background:var(--bg3);color:var(--txt)}
.nav-btn.on{background:linear-gradient(135deg,rgba(26,86,219,.12),rgba(37,99,235,.06));color:var(--acc2)}
.nav-btn.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:55%;background:var(--acc);border-radius:0 2px 2px 0}
.sb-user{padding:11px 14px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:9px}
.u-av{width:30px;height:30px;border-radius:var(--r8);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;background:linear-gradient(135deg,#374151,#1f2937);flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:50px;background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:7px}
.content{flex:1;overflow-y:auto;padding:18px}
.content.no-pad{padding:0;overflow:hidden}

.bx{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.bx-r{background:rgba(185,28,28,.1);color:var(--red);border:1px solid rgba(185,28,28,.25)}
.div-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;vertical-align:middle;margin-right:3px}
.div-tag.hp{background:rgba(14,116,144,.15);color:var(--hp)}
.div-tag.bp{background:rgba(26,86,219,.15);color:var(--bp)}
.up-badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap}

.card{background:#fff;border:1px solid var(--bdr);border-radius:var(--r12);padding:15px;box-shadow:var(--sh2);height:100%}
.card-t{font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:11px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:11px;margin-bottom:18px}
.kpi{background:#fff;border:1px solid var(--bdr);border-radius:var(--r12);padding:14px;box-shadow:var(--sh2);display:flex;flex-direction:column}
.kpi-lbl{font-size:11px;color:var(--txt3);margin-bottom:5px;font-weight:600}
.kpi-val{font-size:24px;font-weight:900;font-family:var(--mono);line-height:1}
.kpi-bar-bg{height:4px;background:var(--bdr);border-radius:2px;flex:1;overflow:hidden;margin-top:6px}
.kpi-bar-fill{height:100%;border-radius:2px}

.tbl-wrap{overflow-x:auto;border-radius:var(--r10);border:1px solid var(--bdr)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#eef2f8;color:var(--txt3);font-weight:700;font-size:10.5px;text-transform:uppercase;padding:9px 12px;text-align:left;border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--bdr);color:var(--txt)}
tr:hover td{background:#eef4ff}

.kb-scroll-wrap{display:flex;gap:9px;overflow-x:auto;padding:14px;height:100%;align-items:flex-start}
.kb-col{min-width:220px;max-width:220px;background:#eceff4;border:1px solid var(--bdr);border-radius:var(--r10);display:flex;flex-direction:column;flex-shrink:0;min-height:300px}
.kb-col.drag-over{background:#dbeafe;border:2px dashed var(--acc2)}
.kb-hdr{padding:10px 12px;border-bottom:1px solid var(--bdr);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:space-between;color:var(--txt2);background:#e2e8f0;border-radius:var(--r10) var(--r10) 0 0}
.kb-cnt{background:#fff;border:1px solid var(--bdr);border-radius:20px;padding:2px 8px;font-size:10px;color:var(--txt2)}
.kb-cards{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
.kb-card{background:#fff;border:1px solid var(--bdr);border-radius:var(--r8);padding:10px;cursor:grab;box-shadow:0 1px 3px rgba(0,0,0,.04);position:relative}
.kb-card:hover{border-color:var(--acc2);box-shadow:0 4px 12px rgba(26,86,219,.12)}
.kb-card:active{cursor:grabbing}
.kc-num{font-family:var(--mono);font-size:10px;color:var(--txt3);margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.kc-nm{font-size:12.5px;font-weight:700;margin-bottom:2px}
.kc-veh{font-size:11px;color:var(--txt2);margin-bottom:6px}
.kc-veh-plate{font-weight:700;color:var(--txt);font-family:var(--mono)}
.kc-ft{display:flex;align-items:center;justify-content:space-between;border-top:1px dashed var(--bdr);padding-top:6px;margin-top:2px}
.kc-ass{font-size:10px;font-weight:600}

.st-grp{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:10px 0}
.st-btn{padding:10px 4px;border-radius:var(--r8);font-size:11px;font-weight:700;border:2px solid transparent;cursor:pointer;text-align:center;background:none}
.st-btn.sel{background:#e2e8f0;border-color:var(--txt2)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:var(--r8);font-size:13px;font-weight:600;border:none;cursor:pointer;white-space:nowrap}
.btn-p{background:var(--acc);color:#fff}.btn-p:hover{background:#1e40af}
.btn-hp{background:var(--hp);color:#fff}
.btn-g{background:var(--grn);color:#fff}
.btn-n{background:#fff;color:var(--txt2);border:1px solid var(--bdr)}.btn-n:hover{background:var(--bg3);color:var(--txt)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:var(--r6)}

.fg{margin-bottom:12px}
.flbl{display:block;font-size:11.5px;font-weight:600;color:var(--txt2);margin-bottom:4px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fi{width:100%;font-size:13px}

.mbk{position:fixed;inset:0;background:rgba(30,40,70,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.mo{background:#fff;border:1px solid var(--bdr);border-radius:var(--r16);width:100%;max-width:760px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.mo-hdr{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mo-ttl{font-size:16px;font-weight:700}
.mo-x{background:none;border:none;color:var(--txt3);font-size:22px;cursor:pointer;line-height:1}
.mo-body{padding:20px;flex:1;overflow-y:auto;background:var(--bg3)}
.mo-ft{padding:14px 20px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px;background:#fff;flex-shrink:0}

.toast{position:fixed;bottom:22px;right:22px;z-index:300;padding:12px 20px;border-radius:var(--r10);font-weight:600;font-size:13px;box-shadow:var(--sh);transition:opacity 0.3s,transform 0.3s}
.toast.s{background:var(--grn);color:#fff}.toast.e{background:var(--red);color:#fff}.toast.i{background:var(--acc);color:#fff}

.tc{background:#fff;border:1px solid var(--bdr);border-radius:var(--r10);padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:8px;box-shadow:var(--sh2)}
.tc-st{min-width:80px;background:#f0f4ff;border-radius:var(--r6);padding:6px;text-align:center;font-size:11px;font-weight:700;color:var(--acc2)}

.login-bg{height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8f0fe 0%,#f0f3f7 50%,#e8edf7 100%)}
.login-box{width:400px;background:#fff;border-radius:16px;padding:32px;box-shadow:var(--sh)}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============================================================
// DATA STRUCTURES
// ============================================================
const BP_STAGES=[
  {id:'bs1',code:'reservation',name:'予約',group:'受付'},{id:'bs2',code:'pickup',name:'引取り',group:'受付'},
  {id:'bs3',code:'checkin',name:'入庫受付',group:'受付'},{id:'bs4',code:'estimate',name:'見積',group:'受付'},
  {id:'bs5',code:'agreement',name:'協定',group:'手配'},{id:'bs8',code:'bankin',name:'板金',group:'作業'},
  {id:'bs10',code:'painting',name:'塗装',group:'作業'},{id:'bs13',code:'inspection',name:'検査',group:'品質'},
  {id:'bs14',code:'billing',name:'清算',group:'完了'},{id:'bs15',code:'delivery',name:'納車',group:'完了'}
];
const HP_STAGES=[
  {id:'hs1',code:'reservation',name:'予約',group:'受付'},{id:'hs2',code:'pickup',name:'引取り',group:'受付'},
  {id:'hs3',code:'checkin',name:'入庫受付',group:'受付'},{id:'hs4',code:'estimate',name:'見積・作業指示',group:'受付'},
  {id:'hs5',code:'work',name:'作業',group:'作業'},{id:'hs6',code:'quality_check',name:'できばえ確認',group:'品質'},
  {id:'hs7',code:'shaken_insp',name:'検査（車検）',group:'品質'},{id:'hs8',code:'billing',name:'清算',group:'完了'},
  {id:'hs9',code:'delivery',name:'納車',group:'完了'}
];
const STAGES=[...BP_STAGES,...HP_STAGES];

const CUSTOMERS_DB=[
  {id:'c1',name:'三田村 康雄'},{id:'c2',name:'前田 律子'},{id:'c3',name:'堀田 直行'},{id:'c4',name:'大野 紀子'}
];
const VEHICLES_DB=[
  {id:'v1',customerId:'c1',maker:'トヨタ',model:'プリウス',plate:'品川 530 す 1234'},
  {id:'v2',customerId:'c2',maker:'ホンダ',model:'フィット',plate:'練馬 330 む 1122'},
  {id:'v3',customerId:'c3',maker:'マツダ',model:'CX-5',plate:'品川 302 と 7890'},
  {id:'v4',customerId:'c4',maker:'ホンダ',model:'フリード',plate:'練馬 501 あ 5678'}
];
const USERS=[
  {id:'u1',name:'有松 真一',role:'admin',div:'all',email:'arimatsu@nt-auto.com'},
  {id:'u2',name:'宮田 憲治',role:'manager',div:'bp',email:'miyata@nt-auto.com'},
  {id:'u3',name:'田口 悟',role:'front',div:'bp',email:'taguchi@nt-auto.com'},
  {id:'u12',name:'鈴木 誠',role:'front',div:'hp',email:'suzuki@nt-auto.com'},
  {id:'u13',name:'高橋 浩二',role:'worker',div:'hp',email:'takahashi@nt-auto.com'},
  {id:'u16',name:'渡辺 剛',role:'driver',div:'all',email:'watanabe@nt-auto.com'}
];

const DEFAULT_UPSTREAMS=[
  {name:'NTS',color:'#1d4ed8'},{name:'自受け',color:'#047857'},{name:'ホンダMM',color:'#b45309'}
];

const ST_LABELS={pending:'未着手',in_progress:'作業中',completed:'完了',hold:'保留'};
const PD_ST_LABELS={pending:'納引待ち',in_progress:'納引中',completed:'納引完了'};

const today=new Date();
const isoDate=d=>{const x=new Date(d);return isNaN(x)?'':x.toISOString().slice(0,10)};
const fmtD=d=>d?new Date(d).toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(' 00:00',''):'—';
const addD=(d,n)=>isoDate(new Date(new Date(d).getTime()+n*86400000));

let STATE={
  user:null, view:'myview', jobs:[], upstreams:DEFAULT_UPSTREAMS,
  toastTimer:null, modal:null, selectedJob:null, newDiv:'bp'
};

function initData(){
  const mkT=(jid,sid,st,a=null)=>({id:`${jid}_${sid}`,stageId:sid,status:st,assigneeId:a,completedAt:st==='completed'?isoDate(today):null});
  STATE.jobs=[
    {id:'j1',jobNumber:'#20001',customerId:'c1',customerName:'三田村 康雄',vehicleName:'トヨタ プリウス　品川 530 す 1234',div:'bp',priority:'urgent',upstream:'NTS',
     entryDate:isoDate(today),promisedPickup:isoDate(today)+'T10:00',plannedWorkStart:isoDate(today)+'T11:00',promisedDelivery:isoDate(today)+'T18:00',
     estimateAmount:120000,tasks:[mkT('j1','bs1','completed','u3'),mkT('j1','bs2','completed','u16'),mkT('j1','bs8','in_progress','u4'),mkT('j1','bs15','pending')]},
    {id:'j2',jobNumber:'#30001',customerId:'c4',customerName:'大野 紀子',vehicleName:'ホンダ フリード　練馬 501 あ 5678',div:'hp',priority:'normal',upstream:'自受け',
     entryDate:addD(today,-1),promisedPickup:addD(today,1)+'T09:00',plannedWorkStart:addD(today,1)+'T10:00',promisedDelivery:addD(today,2)+'T17:00',
     estimateAmount:45000,tasks:[mkT('j2','hs1','completed','u12'),mkT('j2','hs2','pending','u16'),mkT('j2','hs5','pending',null),mkT('j2','hs9','pending')]}
  ];
}

// ============================================================
// CORE LOGIC & RENDER
// ============================================================
function setState(patch){ Object.assign(STATE,typeof patch==='function'?patch(STATE):patch); render(); }

function showToast(msg,type='s'){
  if(STATE.toastTimer) clearTimeout(STATE.toastTimer);
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.textContent=(type==='s'?'✅ ':type==='e'?'❌ ':'ℹ️ ')+msg;
  document.body.appendChild(el);
  STATE.toastTimer=setTimeout(()=>{
    el.style.opacity=0; el.style.transform='translateY(10px)';
    setTimeout(()=>el.remove(),300);
  },3000);
}

function render(){
  const root=document.getElementById('app');
  if(!root)return;
  if(!STATE.user){ root.innerHTML=loginHTML(); bindLogin(); return; }
  root.innerHTML=shellHTML();
  bindEvents();
}

function loginHTML(){
  return `<div class="login-bg"><div class="login-box">
    <h2 style="color:var(--acc);text-align:center;margin-bottom:20px">🔧 Ams PRO v2.3</h2>
    <div class="fg"><label class="flbl">ログインユーザー選択 (デモ)</label>
      <select class="fi" id="l-user">${USERS.map(u=>`<option value="${u.id}">${u.name} (${u.role})</option>`).join('')}</select>
    </div>
    <button class="btn btn-p" style="width:100%" onclick="login()">ログイン</button>
  </div></div>`;
}

function login(){
  const uid=document.getElementById('l-user').value;
  setState({user:USERS.find(u=>u.id===uid), view:'myview'});
}

function shellHTML(){
  const {user,view}=STATE;
  const nav=[
    {v:'myview',l:'👤 マイビュー'},{v:'dashboard',l:'📊 ダッシュボード'},
    {v:'kanban',l:'🚗 引取り・納車'},{v:'bp_kanban',l:'🔵 BPカンバン'},{v:'hp_kanban',l:'🩵 HPカンバン'},
    {v:'joblist',l:'📋 案件一覧'},{v:'masters',l:'⚙️ マスタ管理'}
  ].map(i=>`<button class="nav-btn ${view===i.v?'on':''}" data-view="${i.v}">${i.l}</button>`).join('');

  return `<aside class="sb">
    <div class="sb-logo"><div class="brand">🔧 Ams PRO</div><div class="ver">v2.3 構造改革版</div></div>
    <nav class="sb-nav">${nav}</nav>
    <div class="sb-user"><div class="u-av">${user.name[0]}</div>
      <div><div class="u-nm">${user.name}</div><div class="u-rl">${user.role}</div></div>
      <button class="btn btn-n btn-sm" style="margin-left:auto;padding:2px 6px" onclick="setState({user:null})">退出</button>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <span class="tb-title">${view.toUpperCase()}</span>
      <div class="tb-right">
        <button class="btn btn-n btn-sm" onclick="printTransferList()" style="display:${view==='kanban'?'block':'none'}">🖨️ 引取納車リスト印刷</button>
        <button class="btn btn-hp btn-sm" data-action="new-hp">＋ HP受付</button>
        <button class="btn btn-p btn-sm" data-action="new-bp">＋ BP受付</button>
      </div>
    </header>
    <div class="content ${view.includes('kanban')?'no-pad':''}">${getView()}</div>
  </div>
  ${modalHTML()}`;
}

function getView(){
  const v=STATE.view;
  if(v==='myview') return vMyView();
  if(v==='dashboard') return vDashboard();
  if(v==='kanban') return vTransferKanban();
  if(v==='bp_kanban') return vDivKanban('bp');
  if(v==='hp_kanban') return vDivKanban('hp');
  if(v==='joblist') return vJobList();
  if(v==='masters') return `<div class="alert info">マスタ管理画面は統合済みです（省略表示）</div>`;
  return '';
}

// ── MY VIEW ─────────────────────────
function vMyView(){
  const myTasks=STATE.jobs.flatMap(j=>j.tasks.filter(t=>t.assigneeId===STATE.user.id&&t.status!=='completed').map(t=>({j,t})));
  // 担当者未確定（全体共有）タスクの抽出（予約段階を除く）
  const unassigned=STATE.jobs.flatMap(j=>j.tasks.filter(t=>!t.assigneeId && t.status!=='completed' && STAGES.find(s=>s.id===t.stageId)?.code!=='reservation').map(t=>({j,t})));

  const mkCard=(item,alert=false)=>`
    <div class="tc" data-ojob="${item.j.id}">
      <div class="tc-st">${STAGES.find(s=>s.id===item.t.stageId)?.name}</div>
      <div class="tc-info">
        <div class="tc-job">${divTag(item.j.div)} ${item.j.customerName} <span class="up-badge" style="background:var(--txt3)">${item.j.upstream}</span></div>
        <div class="tc-veh">${item.j.vehicleName}</div>
      </div>
      ${alert?`<span class="bx bx-r">担当者未設定</span>`:''}
    </div>`;

  return `
    <div style="margin-bottom:24px"><h3 style="font-size:14px;margin-bottom:12px">🔨 あなたの担当タスク</h3>
      ${myTasks.length?myTasks.map(i=>mkCard(i)).join(''):'<div class="alert info">現在担当中のタスクはありません</div>'}
    </div>
    <div><h3 style="font-size:14px;margin-bottom:12px;color:var(--red)">🚨 担当者未確定（全体共有）</h3>
      <div class="alert warn">タスクの見落としを防ぐため、担当者がアサインされていない稼働タスクを表示しています。</div>
      ${unassigned.length?unassigned.map(i=>mkCard(i,true)).join(''):'<div class="alert success">未確定のタスクはありません</div>'}
    </div>`;
}

// ── DASHBOARD ─────────────────────────
function vDashboard(){
  const bJobs=STATE.jobs.filter(j=>j.div==='bp');
  const hJobs=STATE.jobs.filter(j=>j.div==='hp');
  const bTot=bJobs.reduce((s,j)=>s+(j.estimateAmount||0),0);
  const hTot=hJobs.reduce((s,j)=>s+(j.estimateAmount||0),0);
  const mkBar=(v,m,c)=>`<div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:${Math.min(100,v/m*100)}%;background:${c}"></div></div>`;

  return `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:20px;height:100%">
    <div class="card"><div class="card-t">🔵 BP事業 (板金) 進捗</div>
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-lbl">見込売上</div><div class="kpi-val" style="color:var(--bp)">${(bTot/10000).toFixed(0)}<span style="font-size:14px">万</span></div>
          <div style="margin-top:8px;font-size:10px;color:var(--txt3)">目標800万 ${mkBar(bTot,8000000,'var(--bp)')}</div></div>
        <div class="kpi"><div class="kpi-lbl">進行中案件数</div><div class="kpi-val">${bJobs.length}</div></div>
      </div>
    </div>
    <div class="card"><div class="card-t">🩵 HP事業 (整備) 進捗</div>
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-lbl">見込売上</div><div class="kpi-val" style="color:var(--hp)">${(hTot/10000).toFixed(0)}<span style="font-size:14px">万</span></div>
          <div style="margin-top:8px;font-size:10px;color:var(--txt3)">目標400万 ${mkBar(hTot,4000000,'var(--hp)')}</div></div>
        <div class="kpi"><div class="kpi-lbl">進行中案件数</div><div class="kpi-val">${hJobs.length}</div></div>
      </div>
    </div>
  </div>`;
}

// ── TRANSFER KANBAN ─────────────────────────
function vTransferKanban(){
  const getT=(code)=>STATE.jobs.map(j=>{
    const t=j.tasks.find(x=>STAGES.find(s=>s.id===x.stageId)?.code===code);
    if(code==='delivery'){
      const pk=j.tasks.find(x=>STAGES.find(s=>s.id===x.stageId)?.code==='pickup');
      if(pk && pk.status!=='completed') return null; // 引取未完了なら納車に出さない
    }
    // 当日完了したものは残す
    if(t && t.status==='completed' && t.completedAt!==isoDate(today)) return null;
    return t?{j,t}:null;
  }).filter(Boolean);

  const mkCard=(i)=>{
    const d=i.j[i.t.stageId.includes('2')?'promisedPickup':'promisedDelivery'];
    return `<div class="kb-card ${i.j.div==='hp'?'hp-card':'bp-card'}" data-ojob="${i.j.id}" draggable="true" data-tid="${i.t.id}">
      <div class="kc-num"><span>${divTag(i.j.div)} ${i.j.customerName}</span><span class="up-badge" style="background:${DEFAULT_UPSTREAMS.find(u=>u.name===i.j.upstream)?.color||'#000'}">${i.j.upstream}</span></div>
      <div class="kc-veh"><span class="kc-veh-plate">${i.j.vehicleName.split('　')[1]||i.j.vehicleName}</span></div>
      <div class="kc-ft">
        <span class="kc-ass" style="color:${i.t.status==='completed'?'var(--grn)':'var(--txt3)'}">${PD_ST_LABELS[i.t.status]||'未定'}</span>
        <span class="kc-day safe">${fmtD(d)}</span>
      </div>
    </div>`;
  };

  return `<div class="kb-scroll-wrap" id="kb-area">
    <div class="kb-col" data-col="pickup"><div class="kb-hdr">🚗 引取予定 (予約含む) <span class="kb-cnt">${getT('pickup').length}</span></div><div class="kb-cards">${getT('pickup').map(mkCard).join('')}</div></div>
    <div class="kb-col" data-col="delivery"><div class="kb-hdr">📦 納車予定 <span class="kb-cnt">${getT('delivery').length}</span></div><div class="kb-cards">${getT('delivery').map(mkCard).join('')}</div></div>
  </div>`;
}

// ── DIV KANBAN ─────────────────────────
function vDivKanban(div){
  const stgs=div==='bp'?BP_STAGES:HP_STAGES;
  const jbs=STATE.jobs.filter(j=>j.div===div);

  const cols=stgs.map(s=>{
    const cards=jbs.filter(j=>j.tasks.some(t=>t.stageId===s.id && (t.status!=='completed' || t.completedAt===isoDate(today))));
    return `<div class="kb-col" data-col="${s.id}"><div class="kb-hdr">${s.name} <span class="kb-cnt">${cards.length}</span></div>
      <div class="kb-cards">
        ${cards.map(j=>{
          const t=j.tasks.find(x=>x.stageId===s.id);
          return `<div class="kb-card ${div==='hp'?'hp-card':'bp-card'}" data-ojob="${j.id}" draggable="true" data-tid="${t.id}">
            <div class="kc-num"><span>${j.jobNumber}</span><span class="up-badge" style="background:${DEFAULT_UPSTREAMS.find(u=>u.name===j.upstream)?.color||'#000'}">${j.upstream}</span></div>
            <div class="kc-veh"><span class="kc-veh-plate">${j.vehicleName.split('　')[1]||j.vehicleName}</span></div>
            <div class="kc-ft"><span class="kc-ass" style="color:${t.status==='completed'?'var(--grn)':'inherit'}">${t.status==='completed'?'当日完了':ST_LABELS[t.status]}</span>
            <span class="kc-day safe">${USERS.find(u=>u.id===t.assigneeId)?.name.split(' ')[0]||'未定'}</span></div>
          </div>`;
        }).join('')}
      </div></div>`;
  }).join('');
  return `<div class="kb-scroll-wrap" id="kb-area">${cols}</div>`;
}

// ── JOB LIST ─────────────────────────
function vJobList(){
  const rows=STATE.jobs.map(j=>{
    const st=STAGES.find(s=>s.id===j.tasks.find(t=>t.status!=='completed')?.stageId)?.name||'完了';
    return `<tr data-ojob="${j.id}" style="cursor:pointer">
      <td>${divTag(j.div)}</td><td class="td-m">${j.jobNumber}</td><td>${j.customerName}</td>
      <td><span class="up-badge" style="background:${DEFAULT_UPSTREAMS.find(u=>u.name===j.upstream)?.color||'#000'}">${j.upstream}</span></td>
      <td>${j.vehicleName}</td><td>${st}</td><td>${fmtD(j.promisedDelivery)}</td>
    </tr>`;
  }).join('');
  return `<div class="tbl-wrap"><table><thead><tr><th>区分</th><th>番号</th><th>顧客</th><th>元請け</th><th>車両</th><th>現在工程</th><th>納車予定</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ── MODALS (Flat UI) ─────────────────────────

    <div class="mo-body">

        <div class="fg"><label class="flbl">顧客選択 (マスタ連動)</label><select class="fi" id="nj-cust"><option value="">-- 新規または選択 --</option>${CUSTOMERS_DB.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div>

// ── DRAG & DROP LOGIC ─────────────────────────
window.allowDrop = (ev)=>{ ev.preventDefault(); ev.currentTarget.classList.add('drag-over');};
window.dragLeave = (ev)=>{ ev.currentTarget.classList.remove('drag-over');};
window.drag = (ev)=>{ ev.dataTransfer.setData("jid", ev.currentTarget.dataset.ojob); ev.dataTransfer.setData("tid", ev.currentTarget.dataset.tid);};
window.drop = (ev)=>{
  ev.preventDefault();
  const targetCol = ev.currentTarget.closest('.kb-col');
  if(targetCol) targetCol.classList.remove('drag-over');
  const jid = ev.dataTransfer.getData("jid");
  const sId = targetCol.dataset.col;
  const job = STATE.jobs.find(j=>j.id===jid);
  if(!job) return;

  // カンバン列IDによるタスク状態の一括更新
  let targetStageId = sId;
  if(sId==='pickup'||sId==='delivery') targetStageId = STAGES.find(s=>s.code===sId && s.div===job.div)?.id;
  
  const sIdx = STAGES.findIndex(s=>s.id===targetStageId);
  job.tasks.forEach(t=>{
    const tIdx = STAGES.findIndex(s=>s.id===t.stageId);
    if(tIdx < sIdx) { t.status='completed'; t.completedAt=isoDate(today); }
    else if(tIdx === sIdx) { t.status='in_progress'; t.completedAt=null; }
    else { t.status='pending'; t.completedAt=null; }
  });
  setState({});
  showToast('工程を移動しました');
};

// ── PRINT LOGIC ─────────────────────────
window.printTransferList = () => {
  const tJ = STATE.jobs.filter(j=>j.tasks.some(t=>['pickup','delivery'].includes(STAGES.find(s=>s.id===t.stageId)?.code)&&t.status!=='completed'));
  tJ.sort((a,b)=>(a.upstream||'').localeCompare(b.upstream||''));
  let html = `<h2>🚗 引取・納車リスト (${isoDate(today)})</h2><table border="1" style="width:100%;border-collapse:collapse;font-size:12px;text-align:left">
    <tr><th>元請け</th><th>顧客</th><th>ナンバー</th><th>区分</th><th>予定日時</th></tr>`;
  tJ.forEach(j=>{
    const t = j.tasks.find(t=>['pickup','delivery'].includes(STAGES.find(s=>s.id===t.stageId)?.code));
    const code = STAGES.find(s=>s.id===t.stageId)?.code;
    html += `<tr><td>${j.upstream}</td><td>${j.customerName}</td><td>${j.vehicleName.split('　')[1]||j.vehicleName}</td><td>${code==='pickup'?'引取':'納車'}</td><td>${fmtD(code==='pickup'?j.promisedPickup:j.promisedDelivery)}</td></tr>`;
  });
  const pw = window.open('','_blank');
  pw.document.write(`<html><head><title>印刷</title><style>body{font-family:sans-serif;padding:20px}th,td{padding:8px}</style></head><body>${html}</body></html>`);
  pw.document.close(); pw.focus(); setTimeout(()=>pw.print(),500);
};

// ── EVENTS BINDING ─────────────────────────
function bindEvents(){
  // Navigation
  document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>setState({view:b.dataset.view})));
  
  // Actions
  document.querySelectorAll('[data-action]').forEach(b=>b.addEventListener('click',(e)=>{
    const act=b.dataset.action;
    if(act==='new-hp') setState({modal:'newJob',newDiv:'hp'});
    if(act==='new-bp') setState({modal:'newJob',newDiv:'bp'});
    if(act==='close') setState({modal:null});
    if(act==='set-deliv') document.getElementById('nj-dl').value=b.dataset.val;
    if(act==='save-nj'){
      const cid=document.getElementById('nj-cust').value;
      const cname=cid?CUSTOMERS_DB.find(c=>c.id===cid).name:'新規顧客';
      const veh=document.getElementById('nj-veh').value||'新規車両';
      const up=document.getElementById('nj-up').value;
      const pk=document.getElementById('nj-pk').value;
      const dl=document.getElementById('nj-dl').value;
      const div=STATE.newDiv;
      const stgs=div==='bp'?BP_STAGES:HP_STAGES;
      const tasks=stgs.map(s=>({id:`n_${Date.now()}_${s.id}`,stageId:s.id,status:'pending',assigneeId:document.getElementById('nj-ass').value||null,completedAt:null}));
      STATE.jobs.push({id:`j${Date.now()}`,jobNumber:`#${div==='hp'?'3':'2'}0099`,customerName:cname,vehicleName:veh,div,priority:'normal',upstream:up,entryDate:isoDate(today),promisedPickup:pk,promisedDelivery:dl,tasks});
      setState({modal:null}); showToast('受付を登録しました');
    }
    if(act==='save-jd'){
      const j=STATE.selectedJob;
      j.upstream=document.getElementById('jd-up').value;
      j.promisedPickup=document.getElementById('jd-pk').value;
      j.plannedWorkStart=document.getElementById('jd-ws').value;
      j.plannedCompletion=document.getElementById('jd-ce').value;
      j.promisedDelivery=document.getElementById('jd-dl').value;
      j.estimateAmount=parseInt(document.getElementById('jd-ea').value)||0;
      j.estimatePartsCost=parseInt(document.getElementById('jd-ep').value)||0;
      setState({modal:null}); showToast('詳細情報を更新しました');
    }
  }));

  // Details open
  document.querySelectorAll('[data-ojob]').forEach(el=>el.addEventListener('click',(e)=>{
    if(e.target.closest('[draggable]')) return; // Ignore if dragging
    const j=STATE.jobs.find(x=>x.id===el.dataset.ojob);
    if(j) setState({modal:'jobDetail',selectedJob:j});
  }));

  // Drag events binding
  const kbArea = document.getElementById('kb-area');
  if(kbArea){
    kbArea.querySelectorAll('.kb-col').forEach(c=>{
      c.addEventListener('dragover', window.allowDrop);
      c.addEventListener('dragleave', window.dragLeave);
      c.addEventListener('drop', window.drop);
    });
    kbArea.querySelectorAll('.kb-card').forEach(c=>{
      c.addEventListener('dragstart', window.drag);
    });
  }

  // Dependent dropdown (Customer -> Vehicle)
  const custSel = document.getElementById('nj-cust');
  if(custSel){
    custSel.addEventListener('change', (e)=>{
      const vs=VEHICLES_DB.filter(v=>v.customerId===e.target.value);
      document.getElementById('nj-veh').innerHTML=vs.length?vs.map(v=>`<option value="${v.maker} ${v.model}　${v.plate}">${v.maker} ${v.model}　${v.plate}</option>`).join(''):'<option value="">車両データなし</option>';
    });
  }
}

// Boot
initData();
render();
</script>
