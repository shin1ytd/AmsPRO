<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ams PRO v1.81 — NTA</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f3f7;--bg2:#ffffff;--bg3:#f5f7fa;--sur:#ffffff;--sur2:#f8f9fc;
  --bdr:#dde3ec;--bdr2:#b8c4d4;--txt:#1a2133;--txt2:#4a5872;--txt3:#8496ae;
  --acc:#1a56db;--acc2:#2563eb;--grn:#047857;--grn2:#059669;
  --ylw:#b45309;--org:#c2410c;--red:#b91c1c;--pur:#6d28d9;--cyn:#0e7490;
  --font:'Noto Sans JP',sans-serif;--mono:'JetBrains Mono',monospace;
  --r6:6px;--r8:8px;--r10:10px;--r12:12px;--r16:16px;
  --sh:0 4px 20px rgba(0,0,0,.09);--sh2:0 1px 6px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
button{cursor:pointer;font-family:var(--font)}
input,select,textarea{font-family:var(--font);outline:none}

/* LAYOUT */
#app{display:flex;height:100vh;overflow:hidden}
.sb{width:210px;min-width:210px;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;z-index:20;box-shadow:2px 0 10px rgba(0,0,0,.06)}
.sb-logo{padding:16px;border-bottom:1px solid var(--bdr);background:linear-gradient(135deg,#1a56db 0%,#1e40af 100%)}
.sb-logo .brand{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.5px}
.sb-logo .ver{font-size:9px;color:rgba(255,255,255,.65);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r8);font-size:13px;font-weight:500;color:var(--txt2);background:none;border:none;width:100%;text-align:left;transition:all .14s;position:relative}
.nav-btn:hover{background:var(--bg3);color:var(--txt)}
.nav-btn.on{background:linear-gradient(135deg,rgba(26,86,219,.12),rgba(37,99,235,.06));color:var(--acc2)}
.nav-btn.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:55%;background:var(--acc);border-radius:0 2px 2px 0}
.nav-ico{font-size:15px;min-width:18px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;font-weight:700}
.sb-user{padding:11px 14px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:9px}
.u-av{width:30px;height:30px;border-radius:var(--r8);background:linear-gradient(135deg,var(--acc),var(--pur));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.u-nm{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u-rl{font-size:10px;color:var(--txt3)}
.logout{background:none;border:none;color:var(--txt3);font-size:16px;padding:4px;border-radius:4px;margin-left:auto;transition:color .15s}
.logout:hover{color:var(--red)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:50px;background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tb-title{font-size:14.5px;font-weight:700}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:7px}
.content{flex:1;overflow-y:auto;padding:18px}
.content.no-pad{padding:0;overflow:hidden}

/* BADGES */
.bx{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.bx-r{background:rgba(185,28,28,.1);color:var(--red);border:1px solid rgba(185,28,28,.25)}
.bx-y{background:rgba(180,83,9,.1);color:var(--ylw);border:1px solid rgba(180,83,9,.25)}
.bx-g{background:rgba(4,120,87,.1);color:var(--grn);border:1px solid rgba(4,120,87,.25)}
.bx-b{background:rgba(26,86,219,.1);color:var(--acc);border:1px solid rgba(26,86,219,.25)}
.bx-n{background:rgba(132,150,174,.12);color:var(--txt2);border:1px solid var(--bdr)}

/* CARDS / KPI */
.card{background:#fff;border:1px solid var(--bdr);border-radius:var(--r12);padding:15px;box-shadow:var(--sh2)}
.card-t{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:11px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:18px}
.kpi{background:#fff;border:1px solid var(--bdr);border-radius:var(--r12);padding:14px 16px;box-shadow:var(--sh2)}
.kpi-lbl{font-size:10.5px;color:var(--txt3);margin-bottom:5px}
.kpi-val{font-size:28px;font-weight:900;font-family:var(--mono);line-height:1}
.kpi.bl .kpi-val{color:var(--acc2)}.kpi.gn .kpi-val{color:var(--grn)}
.kpi.yl .kpi-val{color:var(--ylw)}.kpi.rd .kpi-val{color:var(--red)}
.kpi-sub{font-size:10px;color:var(--txt3);margin-top:4px}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--r10);border:1px solid var(--bdr)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#eef2f8;color:var(--txt3);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;text-align:left;border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--bdr);color:var(--txt)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#eef4ff}
.td-m{font-family:var(--mono);font-size:12px;color:var(--acc2)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ═══════════════════════════════════════════
   KANBAN — スクロールモード
═══════════════════════════════════════════ */
.kb-scroll-wrap{display:flex;gap:9px;overflow-x:auto;padding:14px;height:100%;align-items:flex-start}
.kb-col{min-width:170px;max-width:170px;background:#eceff4;border:1px solid var(--bdr);border-radius:var(--r10);display:flex;flex-direction:column;flex-shrink:0}
.kb-hdr{padding:8px 10px;border-bottom:1px solid var(--bdr);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;color:var(--txt2);background:#e2e8f0;border-radius:var(--r10) var(--r10) 0 0}
.kb-hdr.wip-over{border-bottom-color:var(--red);color:var(--red);background:#fff0f0}
.kb-cnt{background:#fff;border:1px solid var(--bdr);border-radius:20px;padding:1px 6px;font-size:10px;font-weight:700;color:var(--txt2)}
.kb-cnt.over{background:#fee2e2;border-color:var(--red);color:var(--red)}
.kb-cards{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:5px;max-height:calc(100vh - 175px)}
.kb-card{background:#fff;border:1px solid var(--bdr);border-radius:var(--r8);padding:8px 9px;cursor:pointer;transition:all .13s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.kb-card:hover{border-color:var(--acc2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,86,219,.12)}
.kb-card.hold{border-left:3px solid var(--ylw);background:#fffdf5}
.kb-card.urg{border-left:3px solid var(--red);background:#fff8f8}
.kc-num{font-family:var(--mono);font-size:9px;color:var(--txt3);margin-bottom:1px}
.kc-nm{font-size:11.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kc-veh{font-size:10px;color:var(--txt2);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kc-ft{display:flex;align-items:center;justify-content:space-between}
.kc-ass{font-size:9.5px;color:var(--txt3)}
.kc-day{font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:3px}
.kc-day.safe{background:rgba(4,120,87,.12);color:var(--grn)}
.kc-day.warn{background:rgba(180,83,9,.12);color:var(--ylw)}
.kc-day.over{background:rgba(185,28,28,.15);color:var(--red)}
.kc-hold{font-size:8.5px;color:var(--ylw);background:rgba(180,83,9,.1);border-radius:3px;padding:1px 4px;margin-top:2px;display:inline-block}
.kc-profit{font-size:9px;color:var(--grn);font-family:var(--mono);margin-top:1px}
.kc-up{font-size:9px;font-weight:800;padding:1px 5px;border-radius:999px;color:#fff;display:inline-block;margin-bottom:3px}
.up-badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:800;color:#fff;padding:2px 7px;border-radius:999px}
.mini-bar-wrap{display:flex;gap:10px;align-items:flex-end;min-height:180px;padding:12px 6px 4px}
.mini-bar-col{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:6px}
.mini-bar-stack{width:100%;max-width:42px;height:140px;display:flex;align-items:flex-end;gap:6px}
.mini-bar{flex:1;border-radius:8px 8px 0 0;min-height:2px}
.mini-bar.sales{background:var(--acc)}
.mini-bar.profit{background:var(--grn)}
.mini-bar-lbl{font-size:10px;color:var(--txt2);font-weight:700;line-height:1.2;text-align:center;word-break:break-all}
.mini-bar-val{font-size:9px;color:var(--txt3);font-family:var(--mono);text-align:center}


/* ═══════════════════════════════════════════
   KANBAN — フィットモード（一覧）
═══════════════════════════════════════════ */
.kb-fit-wrap{height:100%;overflow:auto;padding:14px}
.kb-fit-table{width:100%;border-collapse:collapse;font-size:12px}
.kb-fit-table th{background:#eef2f8;color:var(--txt3);font-weight:700;font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;padding:6px 8px;text-align:left;border-bottom:2px solid var(--bdr);white-space:nowrap;position:sticky;top:0;z-index:2}
.kb-fit-table td{padding:5px 8px;border-bottom:1px solid var(--bdr);vertical-align:middle}
.kb-fit-table tr:hover td{background:#eef4ff;cursor:pointer}
.kb-fit-table tr:last-child td{border-bottom:none}
.st-pip{display:inline-flex;align-items:center;gap:2px}
.st-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.st-dot.done{background:#047857}.st-dot.cur{background:#1d4ed8}.st-dot.hold{background:#b91c1c}.st-dot.pnd{background:#cbd5e1}
.stg-bar{display:flex;gap:2px;align-items:center}
.stg-cell{width:16px;height:14px;border-radius:2px;font-size:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}

/* ═══════════════════════════════════════════
   STATUS BUTTONS
═══════════════════════════════════════════ */
.st-grp{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:10px 0}
.st-btn{padding:13px 4px;border-radius:var(--r8);font-size:11px;font-weight:700;border:2px solid transparent;cursor:pointer;transition:all .13s;text-align:center;background:none}
.st-btn.pending{border-color:var(--bdr2);color:var(--txt2)}.st-btn.pending.sel{background:#e2e8f0;border-color:var(--txt2)}
.st-btn.ready{border-color:var(--acc);color:var(--acc2)}.st-btn.ready.sel{background:#dbeafe}
.st-btn.in_progress{border-color:var(--ylw);color:var(--ylw)}.st-btn.in_progress.sel{background:#fef3c7}
.st-btn.completed{border-color:var(--grn);color:var(--grn)}.st-btn.completed.sel{background:#d1fae5}
.st-btn.hold{border-color:var(--red);color:var(--red)}.st-btn.hold.sel{background:#fee2e2}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:var(--r8);font-size:13px;font-weight:600;border:none;transition:all .13s;cursor:pointer;white-space:nowrap}
.btn-p{background:var(--acc);color:#fff}.btn-p:hover{background:#1e40af}
.btn-g{background:var(--grn);color:#fff}.btn-g:hover{background:#065f46}
.btn-y{background:var(--ylw);color:#fff}.btn-y:hover{background:#92400e}
.btn-r{background:var(--red);color:#fff}.btn-r:hover{background:#991b1b}
.btn-n{background:transparent;color:var(--txt2);border:1px solid var(--bdr)}.btn-n:hover{background:var(--bg3);color:var(--txt)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:var(--r6)}
.btn-lg{padding:14px 20px;font-size:14px;border-radius:var(--r10);min-width:120px}

/* TOGGLE BUTTON GROUP */
.tog-grp{display:flex;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r8);padding:3px;gap:2px}
.tog-btn{padding:5px 12px;border-radius:5px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:transparent;color:var(--txt3);transition:all .13s}
.tog-btn.on{background:#fff;color:var(--acc2);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* FORMS */
.fg{margin-bottom:14px}
.flbl{display:block;font-size:11.5px;font-weight:600;color:var(--txt2);margin-bottom:5px}
.fi{width:100%;background:#fff;border:1px solid var(--bdr);color:var(--txt);padding:9px 12px;border-radius:var(--r8);font-size:13px;transition:all .14s}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.fi option{background:#fff}
textarea.fi{resize:vertical;min-height:75px}
.dsc{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.ds{padding:4px 9px;border-radius:5px;font-size:11px;font-weight:600;background:#eff6ff;border:1px solid #bfdbfe;color:var(--acc2);cursor:pointer;transition:all .13s}
.ds:hover{border-color:var(--acc);color:#fff;background:var(--acc)}

/* MODAL */
.mbk{position:fixed;inset:0;background:rgba(30,40,70,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.mo{background:#fff;border:1px solid var(--bdr);border-radius:var(--r16);width:100%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.mo-hdr{padding:18px 22px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;border-radius:var(--r16) var(--r16) 0 0}
.mo-ttl{font-size:15px;font-weight:700}
.mo-x{background:none;border:none;color:var(--txt3);font-size:22px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1;transition:color .14s}
.mo-x:hover{color:var(--red)}
.mo-body{padding:18px 22px}
.mo-ft{padding:14px 22px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px}
.tabs{display:flex;border-bottom:1px solid var(--bdr);background:#f8fafc;flex-shrink:0}
.tab{padding:10px 16px;border:none;background:none;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--txt3);border-bottom:2px solid transparent;transition:all .13s}
.tab.on{color:var(--acc2);border-bottom-color:var(--acc);font-weight:700}

/* STAGE FLOW */
.sf{display:flex;flex-direction:column;gap:5px}
.sf-row{display:flex;align-items:center;gap:9px;padding:9px 12px;background:#f8fafc;border:1px solid var(--bdr);border-radius:var(--r8);cursor:pointer;transition:all .13s}
.sf-row:hover{border-color:var(--acc2);background:#eff6ff}
.sf-row.cur{border-left:3px solid var(--acc);background:#eff6ff}
.sf-row.done{opacity:.6;background:#f0fdf4}
.sf-row.hld{border-left:3px solid var(--ylw);background:#fffbeb}
.sf-row.no-edit{cursor:default}
.sf-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sf-num.d{background:var(--grn);color:#fff}.sf-num.c{background:var(--acc);color:#fff}
.sf-num.h{background:var(--ylw);color:#fff}.sf-num.p{background:#e2e8f0;color:#64748b;border:1px solid var(--bdr)}
.sf-nm{flex:1;font-size:13px;font-weight:600}
.sf-sub{font-size:11px;color:var(--txt3);min-width:60px}

/* MY VIEW */
.tc{background:#fff;border:1px solid var(--bdr);border-radius:var(--r10);padding:11px 13px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all .13s;box-shadow:var(--sh2)}
.tc:hover{border-color:var(--acc2);background:#eff6ff}
.tc-st{min-width:76px;background:#f0f4ff;border-radius:var(--r6);padding:6px 8px;text-align:center}
.tc-st-nm{font-size:11px;font-weight:700;color:var(--acc2)}
.tc-info{flex:1;min-width:0}
.tc-job{font-size:13px;font-weight:700}
.tc-veh{font-size:11.5px;color:var(--txt2)}
.tc-eta{font-size:10.5px;color:var(--txt3);margin-top:2px}

/* ALERTS */
.alert{padding:9px 13px;border-radius:var(--r8);font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:7px;margin-bottom:8px}
.alert.warn{background:rgba(180,83,9,.08);border:1px solid rgba(180,83,9,.2);color:var(--ylw)}
.alert.danger{background:rgba(185,28,28,.08);border:1px solid rgba(185,28,28,.2);color:var(--red)}
.alert.info{background:rgba(26,86,219,.08);border:1px solid rgba(26,86,219,.2);color:var(--acc2)}
.alert.success{background:rgba(4,120,87,.08);border:1px solid rgba(4,120,87,.2);color:var(--grn)}

/* BOTTLENECK */
.bn{display:flex;flex-direction:column;gap:7px}
.bn-r{display:flex;align-items:center;gap:8px;font-size:12px}
.bn-lbl{width:75px;color:var(--txt2);font-size:11.5px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bn-tr{flex:1;height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.bn-fi{height:100%;border-radius:4px;transition:width .5s}
.bn-n{width:28px;text-align:right;font-family:var(--mono);font-size:11.5px;color:var(--txt2);flex-shrink:0}

/* PROFIT */
.pr-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bdr);font-size:13px}
.pr-row:last-child{border:none}
.pr-lbl{color:var(--txt2)}.pr-val{font-family:var(--mono);font-weight:700}
.pos{color:var(--grn)}.neg{color:var(--red)}

/* CONFLICT */
.cf-box{background:rgba(185,28,28,.06);border:1px solid rgba(185,28,28,.2);border-radius:var(--r10);padding:14px;margin-bottom:14px}
.cf-ttl{font-size:13.5px;font-weight:700;color:var(--red);margin-bottom:7px}
.cf-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.cf-col{background:#f8fafc;border:1px solid var(--bdr);border-radius:var(--r6);padding:8px;font-size:12px}
.cf-cl{font-size:10px;color:var(--txt3);margin-bottom:3px;font-weight:600;text-transform:uppercase}

/* FILTER */
.fbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
.fchip{padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--bdr);color:var(--txt2);background:none;cursor:pointer;transition:all .13s}
.fchip:hover{border-color:var(--acc);color:var(--acc2)}
.fchip.on{background:#dbeafe;border-color:var(--acc);color:var(--acc2)}

/* LOGIN */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8f0fe 0%,#f0f3f7 50%,#e8edf7 100%)}
.login-box{width:420px;background:#fff;border:1px solid var(--bdr);border-radius:20px;padding:36px;box-shadow:0 8px 40px rgba(26,86,219,.12)}
.l-brand{font-size:26px;font-weight:900;color:var(--acc);text-align:center}
.l-tag{font-size:11px;color:var(--txt3);margin-top:3px;text-align:center;margin-bottom:28px}
.demo-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px}
.demo-btn{background:#f5f8ff;border:1px solid var(--bdr);color:var(--txt2);padding:7px 9px;border-radius:var(--r6);font-size:11.5px;cursor:pointer;text-align:left;transition:all .13s}
.demo-btn:hover{background:#dbeafe;border-color:var(--acc);color:var(--acc2)}
.demo-rl{display:block;font-size:10px;color:var(--txt3);margin-top:2px}

/* TOAST */

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* QR SCAN MODAL */
.qr-box{background:linear-gradient(135deg,#1a56db,#0e7490);border-radius:var(--r12);padding:22px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.qr-box::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.04) 2px,rgba(255,255,255,.04) 4px)}

.qr-corner{position:absolute;width:20px;height:20px;border-color:#fff;border-style:solid;border-radius:2px}
.qr-corner.tl{top:-2px;left:-2px;border-width:3px 0 0 3px}
.qr-corner.tr{top:-2px;right:-2px;border-width:3px 3px 0 0}
.qr-corner.bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px}
.qr-corner.br{bottom:-2px;right:-2px;border-width:0 3px 3px 0}
.qr-scan-line{position:absolute;left:8px;right:8px;height:2px;background:rgba(255,255,255,.8);box-shadow:0 0 8px rgba(255,255,255,.6);animation:scanLine 2s linear infinite}

.qr-icon{font-size:48px}
.qr-lbl{color:rgba(255,255,255,.9);font-size:12px;font-weight:600}
.qr-result{background:#f0fdf4;border:1.5px solid var(--grn);border-radius:var(--r10);padding:14px;margin-bottom:14px}
.qr-result-t{font-size:11px;font-weight:700;color:var(--grn);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px}

  if(typeof patch==='function')patch=patch(STATE);
  Object.assign(STATE,patch);
  render();
}
function showToast(msg,type='s'){
  clearTimeout(STATE.toastTimer);
  const t=setTimeout(()=>setState({toast:null,toastTimer:null}),3000);
  setState({toast:{msg,type},toastTimer:t});
}

// ============================================================
// HELPERS
// ============================================================
function getCurTask(job){
  return job.tasks.find(t=>['in_progress','hold'].includes(t.status))
      || job.tasks.find(t=>t.status==='ready')
      || job.tasks[job.tasks.length-1];
}
function getCurStageName(job){const t=getCurTask(job);const s=STAGES.find(s=>s.id===t?.stageId);return s?.name||'—';}
function getUsers(){return STATE.users||USERS;}
function getUserById(id){return getUsers().find(u=>u.id===id);}
function getUpstreamMaster(name){return (STATE.upstreams||[]).find(u=>(typeof u==='string'?u:u.name)===name);}
function getUpstreamOptions(){return (STATE.upstreams||[]).map(u=>typeof u==='string'?u:u.name).filter(Boolean);}
function getUpstreamColor(name){return getUpstreamMaster(name)?.color||'var(--acc2)';}
function getUpstreamShort(name){return Array.from(String(name||'自受け')).slice(0,2).join('');}
function upstreamBadge(name){
  return `<span class="up-badge" style="background:${getUpstreamColor(name)}">${name||'自受け'}</span>`;
}
function canEdit(user,task,job){
  if(!user||user.role==='readonly')return false;
  if(['admin','manager'].includes(user.role))return true;
  if(user.role==='front')return (job?.frontOwnerId||'')===user.id;
  return user.role==='worker'&&task?.assigneeId===user.id;
}
function canEditFinance(user,job){
  if(!user||user.role==='readonly'||user.role==='worker')return false;
  if(['admin','manager'].includes(user.role))return true;
  return user.role==='front'&&(job?.frontOwnerId||'')===user.id;
}
function canSeeMoney(user){return['admin','manager','front'].includes(user?.role);}
function getProfit(j){return (j.estimateAmount||0)-(j.estimatePartsCost||0)-(j.estimateLaborCost||0);}
function getPeriodJobs(period='currentMonth'){
  const nextMonthKey=(()=>{const d=new Date(today);d.setMonth(d.getMonth()+1);return monthKey(d);})();
  if(period==='all')return STATE.jobs;
  return STATE.jobs.filter(j=>{
    const k=monthKey(j.settlementDate||j.promisedDelivery||j.entryDate);
    return period==='nextMonth'?k===nextMonthKey:k===currentMonthKey;
  });
}
function getKpiTarget(period='currentMonth'){
  const keys=period==='all'
    ? [...new Set(getPeriodJobs(period).map(j=>monthKey(j.settlementDate||j.promisedDelivery||j.entryDate)).filter(Boolean))]
    : [period==='nextMonth'?(()=>{const d=new Date(today);d.setMonth(d.getMonth()+1);return monthKey(d);})():currentMonthKey];
  return (STATE.kpiTargets||[]).filter(t=>keys.includes(t.month)).reduce((acc,t)=>({
    salesTarget:acc.salesTarget+(parseInt(t.salesTarget,10)||0),
    profitTarget:acc.profitTarget+(parseInt(t.profitTarget,10)||0),
    countTarget:acc.countTarget+(parseInt(t.countTarget,10)||0)
  }),{salesTarget:0,profitTarget:0,countTarget:0});
}
function updateTask(jobId,taskId,changes,clientVer){
  let conflict=null;
  const jobs=STATE.jobs.map(j=>{
    if(j.id!==jobId)return j;
    return{...j,tasks:j.tasks.map(t=>{
      if(t.id!==taskId)return t;
      if(t.version!==clientVer){conflict={task:{...t},attempted:changes,clientVer};return t;}
      return{...t,...changes,version:t.version+1};
    })};
  });
  if(conflict){setState({jobs,conflictData:conflict,selectedJob:jobs.find(j=>j.id===jobId),modal:'conflict'});return false;}
  setState({jobs});return true;
}
function updateJob(jobId,changes){
  const jobs=STATE.jobs.map(j=>j.id===jobId?{...j,...changes,version:(j.version||1)+1}:j);
  const selected=jobs.find(j=>j.id===jobId)||null;
  setState({jobs,selectedJob:selected});
  return selected;
}

    document.body.appendChild(el);
  }
}

function vDashboard(){

  const jobs=getPeriodJobs(period);
  const tot=jobs.reduce((s,j)=>s+(j.estimateAmount||0),0);
  const totp=jobs.reduce((s,j)=>s+getProfit(j),0);
  const over=jobs.filter(j=>diffD(j.promisedDelivery)<0).length;
  const holds=jobs.filter(j=>j.tasks.some(t=>t.status==='hold')).length;
  const target=getKpiTarget(period);
  const stcnt={};
  jobs.forEach(j=>{const t=getCurTask(j);if(t)stcnt[t.stageId]=(stcnt[t.stageId]||0)+1;});
  const maxv=Math.max(1,...Object.values(stcnt),1);
  const bnRows=STAGES.filter(s=>stcnt[s.id]>0).sort((a,b)=>(stcnt[b.id]||0)-(stcnt[a.id]||0))
    .map(s=>{const n=stcnt[s.id];const c=n>=4?'var(--red)':n>=2?'var(--ylw)':'var(--acc)';

      <div class="bn-n">${n}</div></div>`;}).join('');
  const hcnt={};

  const hmax=Math.max(1,...Object.values(hcnt),1);

function vKanbanScroll(){
  const {user,jobs}=STATE;const sm=canSeeMoney(user);
  const canAdd=['admin','manager','front'].includes(user.role);
  const stmap={};STAGES.forEach(s=>{stmap[s.id]=[];});
  jobs.forEach(j=>{const t=getCurTask(j);if(t){if(!stmap[t.stageId])stmap[t.stageId]=[];stmap[t.stageId].push(j);}});
  const cols=STAGES.map(stage=>{
    const sj=stmap[stage.id]||[];
    const lim=STATE.wipLimits[stage.id];const over=lim&&sj.length>lim;
    const cards=sj.map(j=>{
      const t=getCurTask(j);const dd=diffD(j.promisedDelivery);
      const dcls=dd<0?'over':dd<=2?'warn':'safe';
      const dlbl=dd<0?`+${Math.abs(dd)}d`:dd===0?'今日':`${dd}d`;
      const hr=t?.holdReasonId?HOLD_REASONS.find(h=>h.id===t.holdReasonId):null;
      const ass=t?.assigneeId?getUsers().find(u=>u.id===t.assigneeId):null;
      return`<div class="kb-card ${t?.status==='hold'?'hold':''} ${j.priority==='urgent'?'urg':''}" data-ojob="${j.id}">
        <div class="kc-num">${j.jobNumber}</div>
        <div class="kc-up" style="background:${getUpstreamColor(j.upstream||'自受け')}">${getUpstreamShort(j.upstream||'自受け')}</div><div class="kc-nm">[${getUpstreamShort(j.upstream||'自受け')}] ${j.customerName}</div>
        <div class="kc-veh">${j.vehicleName.split('　')[0]}</div>
        ${hr?`<span class="kc-hold">⚠️ ${hr.name}</span>`:''}
        ${sm?`<div class="kc-profit">¥${(getProfit(j)/10000).toFixed(1)}万</div>`:''}
        <div class="kc-ft">
          <span class="kc-ass">${ass?ass.name.split(' ')[1]||ass.name.slice(-2):'未割'}</span>
          <span class="kc-day ${dcls}">${dlbl}</span>
        </div>

    return`<div class="kb-col">
      <div class="kb-hdr ${over?'wip-over':''}">

        <span class="kb-cnt ${over?'over':''}">${sj.length}${lim?`/${lim}`:''}</span>

    <div style="padding:10px 14px 0;display:flex;align-items:center;gap:8px;flex-shrink:0">
      <span style="font-size:12px;color:var(--txt3)">全 ${jobs.length} 件 ／ 工程別表示</span>
      ${canAdd?`<button class="btn btn-p btn-sm" id="new-job-btn" style="margin-left:auto">+ 受付</button>`:''}
    </div>
    <div class="kb-scroll-wrap">${cols}</div>
  </div>`;
}

// ── JOB LIST ──────────────────────────────────────────
function vJobList(){
  const {user,jobs}=STATE;const sm=canSeeMoney(user);
  const canAdd=['admin','manager','front'].includes(user.role);
  const lp=STATE.listPeriod||'currentMonth';
  const from=STATE.listDateFrom||currentMonthKey+'-01';
  const to=STATE.listDateTo||addD(today,31);
  const periodBase=lp==='currentMonth'?jobs.filter(j=>monthKey(j.promisedDelivery||j.entryDate)===currentMonthKey)
    :lp==='prevMonth'?jobs.filter(j=>monthKey(j.promisedDelivery||j.entryDate)===prevMonthKey)
    :jobs.filter(j=>inRange(j.promisedDelivery||j.entryDate,from,to));
  const counts={
    all:periodBase.length,
    today:periodBase.filter(j=>diffD(j.promisedDelivery)===0).length,
    over:periodBase.filter(j=>diffD(j.promisedDelivery)<0).length,
    hold:periodBase.filter(j=>j.tasks.some(t=>t.status==='hold')).length,
    urgent:periodBase.filter(j=>j.priority==='urgent').length,
    insp:periodBase.filter(j=>j.tasks.some(t=>STAGES.find(s=>s.id===t.stageId)?.code==='inspection'&&t.status==='in_progress')).length
  };
  const fl=STATE.listFilter||'all';
  let filtered=
    fl==='all'?periodBase
    :fl==='today'?periodBase.filter(j=>diffD(j.promisedDelivery)===0)
    :fl==='over'?periodBase.filter(j=>diffD(j.promisedDelivery)<0)
    :fl==='hold'?periodBase.filter(j=>j.tasks.some(t=>t.status==='hold'))
    :fl==='urgent'?periodBase.filter(j=>j.priority==='urgent')
    :periodBase.filter(j=>j.tasks.some(t=>STAGES.find(s=>s.id===t.stageId)?.code==='inspection'&&t.status==='in_progress'));

  const upstreamFilter=STATE.listUpstream||'all';
  if(upstreamFilter!=='all') filtered=filtered.filter(j=>(j.upstream||'自受け')===upstreamFilter);

  const sortKey=STATE.listSort||'dateDesc';
  filtered=[...filtered].sort((a,b)=>{
    if(sortKey==='upstreamAsc' || sortKey==='upstreamDesc'){
      const diff=String(a.upstream||'').localeCompare(String(b.upstream||''),'ja');
      if(diff!==0) return sortKey==='upstreamAsc'?diff:-diff;
    }
    if(sortKey==='profitDesc'){
      const diff=getProfit(b)-getProfit(a);
      if(diff!==0) return diff;
    }
    const da=new Date(a.entryDate||a.promisedDelivery||0).getTime();
    const db=new Date(b.entryDate||b.promisedDelivery||0).getTime();
    if(da!==db) return sortKey==='dateAsc'?da-db:db-da;
    return String(a.jobNumber).localeCompare(String(b.jobNumber), 'ja');
  });

  const chips=[['all','全件'],['today','📦本日納車'],['over','🚨超過'],['hold','⏸保留'],['urgent','❗緊急'],['insp','🔍本日検査']]
    .map(([id,lbl])=>`<button class="fchip ${fl===id?'on':''}" data-fl="${id}">${lbl} (${counts[id]})</button>`).join('');

  const periodLabel=lp==='currentMonth'?'当月分':lp==='prevMonth'?'前月分':'自由選択';
  const periodBtns=`
    <div class="fbar" style="margin:0;align-items:center">
      <button class="fchip ${(lp==='currentMonth')?'on':''}" data-period="currentMonth">当月分</button>
      <button class="fchip ${(lp==='prevMonth')?'on':''}" data-period="prevMonth">前月分</button>
      <button class="fchip ${(lp==='custom')?'on':''}" data-period="custom">自由選択</button>
      ${lp==='custom'?`
        <span style="display:inline-flex;align-items:center;gap:6px;margin-left:4px">
          <input class="fi" type="date" id="list-date-from" value="${from}" style="width:auto;min-width:140px;padding:6px 10px">
          <span style="font-size:12px;color:var(--txt3)">〜</span>
          <input class="fi" type="date" id="list-date-to" value="${to}" style="width:auto;min-width:140px;padding:6px 10px">
        </span>`:''}
    </div>`;

  const rows=filtered.map(j=>{
    const t=getCurTask(j);const st=STAGES.find(s=>s.id===t?.stageId);
    const ass=t?.assigneeId?getUsers().find(u=>u.id===t.assigneeId):null;
    const dd=diffD(j.promisedDelivery);const p=getProfit(j);
    return`<tr style="cursor:pointer" data-ojob="${j.id}">
      <td class="td-m">${j.jobNumber}</td>
      <td style="font-weight:700">${j.customerName}</td>
      <td>${upstreamBadge(j.upstream||'自受け')}</td>
      <td style="color:var(--txt2);font-size:12px;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis">${j.vehicleName}</td>
      <td style="font-size:11px">${PRI_LABELS[j.priority]}</td>
      <td>${st?.name||'—'}</td>
      <td style="font-size:12px;color:var(--txt2)">${ass?.name||'未割当'}</td>
      <td><span style="font-family:var(--mono);font-size:12px;font-weight:700;color:${dd<0?'var(--red)':dd<=2?'var(--ylw)':'var(--txt2)'}">${fmtD(j.promisedDelivery)}</span>
        ${dd<0?`<span class="bx bx-r" style="font-size:9px;margin-left:3px">+${Math.abs(dd)}d</span>`:''}</td>
      <td><span style="font-size:10px;padding:2px 6px;border-radius:3px;font-weight:700;background:${ST_COLORS[t?.status||'pending']}18;color:${ST_COLORS[t?.status||'pending']}">${ST_LABELS[t?.status||'pending']}</span></td>
      ${sm?`<td style="font-family:var(--mono);color:${p>0?'var(--grn)':'var(--red)'};font-weight:700">¥${(p/10000).toFixed(1)}万</td>`:''}
    </tr>`;}).join('');

  return`<div class="s-hdr" style="align-items:flex-start;gap:10px;flex-wrap:wrap">
    <div style="display:flex;flex-direction:column;gap:8px">
      ${periodBtns}
      <div class="fbar" style="margin:0">${chips}</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:0">
        <select class="fi" id="list-upstream" style="width:auto;min-width:170px">
          <option value="all">元受け：すべて</option>
          ${getUpstreamOptions().map(v=>`<option value="${v}" ${STATE.listUpstream===v?'selected':''}>元受け：${v}</option>`).join('')}
        </select>
        <select class="fi" id="list-sort" style="width:auto;min-width:170px">
          <option value="dateDesc" ${STATE.listSort==='dateDesc'?'selected':''}>並び順：入庫日（新しい順）</option>
          <option value="dateAsc" ${STATE.listSort==='dateAsc'?'selected':''}>並び順：入庫日（古い順）</option>
          <option value="upstreamAsc" ${STATE.listSort==='upstreamAsc'?'selected':''}>並び順：元受け（昇順）</option>
          <option value="upstreamDesc" ${STATE.listSort==='upstreamDesc'?'selected':''}>並び順：元受け（降順）</option>
          <option value="profitDesc" ${STATE.listSort==='profitDesc'?'selected':''}>並び順：粗利（高い順）</option>
        </select>
      </div>
      <div style="font-size:12px;color:var(--txt3)">表示期間：${periodLabel}${lp==='custom'&&from&&to?`（${from} 〜 ${to}）`:''}</div>
    </div>
    ${canAdd?`<button class="btn btn-p btn-sm" id="new-job-btn">+ 受付</button>`:''}
  </div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>番号</th><th>顧客</th><th>元受け</th><th>車両</th><th>優先</th><th>現在工程</th><th>担当者</th><th>納車日</th><th>状態</th>${sm?'<th>粗利</th>':''}</tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function modalHTML(){
  const {modal}=STATE;

// ── TASK MODAL ──────────────────────────────────────────

  const dsc=`<div class="dsc">
    <button class="ds" data-dsc="${isoDate(today)}">今日</button>
    <button class="ds" data-dsc="${addD(today,1)}">明日</button>
    <button class="ds" data-dsc="${addD(today,2)}">明後日</button>
    <button class="ds" data-dsc="${nextMon()}">来週月曜</button>

          <button class="btn btn-lg" id="insp-ok" style="border:2px solid var(--grn);background:rgba(4,120,87,.08);color:var(--grn)">✅ OK（合格）</button>
          <button class="btn btn-lg" id="insp-ng" style="border:2px solid var(--red);background:rgba(185,28,28,.08);color:var(--red)">❌ NG（不合格）</button>

// ── JOB DETAIL ──────────────────────────────────────────
function mJobDetail(){
  const {selectedJob:j,user}=STATE;if(!j)return'';
  const sm=canSeeMoney(user);const tab=STATE.jobDetailTab||'flow';
  const canEditThis=canEditFinance(user,j);
  const flowRows=j.tasks.map((t,i)=>{
    const st=STAGES.find(s=>s.id===t.stageId);
    const ass=t.assigneeId?getUserById(t.assigneeId):null;
    const hr=t.holdReasonId?HOLD_REASONS.find(h=>h.id===t.holdReasonId):null;
    const isDone=t.status==='completed';const isCur=['in_progress','hold'].includes(t.status);
    const editable=canEdit(user,t,j);
    return`<div class="sf-row ${isCur?'cur':''} ${isDone?'done':''} ${t.status==='hold'?'hld':''} ${editable?'':'no-edit'}"
      ${editable?`data-otask="${j.id}__${t.id}"`:''}">
      <div class="sf-num ${isDone?'d':isCur?'c':t.status==='hold'?'h':'p'}">${isDone?'✓':i+1}</div>
      <div class="sf-nm">${st?.name||'—'}${hr?`<span style="margin-left:6px;font-size:10px;color:var(--ylw)">⚠️ ${hr.name}</span>`:''}
        ${t.reworkCount>0?`<span style="margin-left:6px;font-size:10px;color:var(--red)">差戻${t.reworkCount}回</span>`:''}</div>
      <div class="sf-sub">${ass?ass.name.split(' ')[1]||ass.name:'—'}</div>
      <div class="sf-sub">${fmtD(t.finishEta)}</div>
      <div><span style="font-size:10.5px;font-weight:700;padding:2px 6px;border-radius:3px;background:${ST_COLORS[t.status]}18;color:${ST_COLORS[t.status]}">${ST_LABELS[t.status]}</span></div>
      ${editable?'<span style="font-size:11px;color:var(--txt3)">✏️</span>':''}
    </div>`;}).join('');
  const info=[['案件番号',j.jobNumber],['顧客',j.customerName],['元受け',j.upstream||'自受け'],['車両',j.vehicleName],
    ['フロント担当',getUserById(j.frontOwnerId)?.name||'—'],
    ['優先度',PRI_LABELS[j.priority]],['入庫日',fmtD(j.entryDate)],
    ['約束納車日',fmtD(j.promisedDelivery)],['清算予定日',fmtD(j.settlementDate)],
    ['社内締切',fmtD(j.internalDeadline)],['備考',j.note||'—'],['version',`v${j.version}`]].map(([k,v])=>`
    <div class="pr-row"><span class="pr-lbl">${k}</span><span style="font-weight:600">${v}</span></div>`).join('');
  const p=getProfit(j);
  const finRead=[['見込み売上',j.estimateAmount,''],['見込み部品原価',-j.estimatePartsCost,'neg'],
    ['見込み工賃',-j.estimateLaborCost,'neg'],['── 見込み粗利',p,p>=0?'pos':'neg'],
    ['粗利率',`${j.estimateAmount?Math.round(p/j.estimateAmount*100):0}%`,p>=0?'pos':'neg']].map(([k,v,cls])=>`
    <div class="pr-row"><span class="pr-lbl">${k}</span>
    <span class="pr-val ${cls}">${typeof v==='number'?`¥${Math.abs(v).toLocaleString()}`:v}</span></div>`).join('');
  const finEdit=canEditThis?`
    <div class="fg"><label class="flbl">見込み売上</label><input type="number" class="fi" id="jf-sales" value="${j.estimateAmount||0}"></div>
    <div class="fg"><label class="flbl">見込み部品原価</label><input type="number" class="fi" id="jf-parts" value="${j.estimatePartsCost||0}"></div>
    <div class="fg"><label class="flbl">見込み工賃</label><input type="number" class="fi" id="jf-labor" value="${j.estimateLaborCost||0}"></div>
    <div class="fg"><label class="flbl">清算予定日</label><input type="date" class="fi" id="jf-settlement" value="${j.settlementDate||j.promisedDelivery||''}"></div>
    <div class="fg"><label class="flbl">担当フロント</label>
      <select class="fi" id="jf-front">${getUsers().filter(u=>['admin','manager','front'].includes(u.role) && (user.role!=='front' || u.id===user.id)).map(u=>`<option value="${u.id}" ${j.frontOwnerId===u.id?'selected':''}>${u.name}（${ROLE_LABELS[u.role]}）</option>`).join('')}</select>
    </div>
    <div class="fg"><label class="flbl">備考</label><textarea class="fi" id="jf-note">${j.note||''}</textarea></div>
    <div style="display:flex;justify-content:flex-end"><button class="btn btn-p" id="jf-save">財務情報を保存</button></div>
  `:'';
  return`<div class="mbk" id="mbk">
  <div class="mo" style="max-width:700px">
    <div class="mo-hdr">
      <div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="mo-ttl">${j.jobNumber}</span>
          <span class="bx ${j.priority==='urgent'?'bx-r':j.priority==='high'?'bx-y':'bx-n'}">${PRI_LABELS[j.priority]}</span>
        </div>
        <div style="font-size:12.5px;color:var(--txt2);margin-top:3px">${j.customerName} ／ ${j.vehicleName}</div>
      </div>
      <button class="mo-x" id="mc-x">×</button>
    </div>
    <div class="tabs">
      <button class="tab ${tab==='flow'?'on':''}" data-jdtab="flow">工程フロー</button>

    </div>
    <div class="mo-body">
      ${tab==='flow'?`<div class="sf">${flowRows}</div>`:''}

      ${tab==='fin'&&sm?`${finRead}${finEdit}`:''}

  </div>
</div>`;
}

          <span>車台番号</span><span style="font-family:var(--mono);color:var(--txt)">${qr.vin}</span>
          <span>排気量</span><span style="color:var(--txt)">${(qr.disp/1000).toFixed(1)}L / ${qr.engine}</span>
          <span>色</span><span style="color:var(--txt)">${qr.color}</span>
          <span>年式</span><span style="color:var(--txt)">${qr.year}年</span>
        </div>
      </div>`:''}
      <div class="fg">
        <label class="flbl">工程テンプレート</label>
        <select class="fi" id="nj-t">${tmplOpts}</select>
        <div id="tmpl-st" style="font-size:11px;color:var(--txt3);margin-top:5px"></div>
      </div>
      <div class="fg">
        <label class="flbl">優先度</label>
        <div style="display:flex;gap:7px;margin-top:4px">
          ${[['urgent','🔴 緊急'],['high','🟠 急ぎ'],['normal','⬜ 通常'],['low','🟢 余裕']].map(([v,l])=>
            `<button class="btn btn-n btn-sm nj-pri" data-pri="${v}" style="flex:1">${l}</button>`).join('')}
        </div>
        <input type="hidden" id="nj-pri" value="normal">
      </div>
      <div class="fg">
        <label class="flbl">約束納車日</label>
        <input type="date" class="fi" id="nj-d" value="${addD(today,7)}">
        <div class="dsc">
          <button class="ds" data-dsc3="${addD(today,7)}">1週間後</button>
          <button class="ds" data-dsc3="${addD(today,14)}">2週間後</button>
          <button class="ds" data-dsc3="${addD(today,21)}">3週間後</button>
        </div>
      </div>
      <div class="fg"><label class="flbl">見積金額（円）</label><input type="number" class="fi" id="nj-e" placeholder="150000"></div>
      <div class="fg"><label class="flbl">清算予定日</label><input type="date" class="fi" id="nj-sd" value="${addD(today,7)}"></div>
      <div class="fg"><label class="flbl">担当フロント</label><select class="fi" id="nj-f">${fOpts}</select></div>
    </div>
    <div class="mo-ft">
      <button class="btn btn-n" id="mc-x2">キャンセル</button>
      <button class="btn btn-p" id="nj-save">案件を登録する</button>
    </div>
  </div>
</div>`;
}

// ── CONFLICT ──────────────────────────────────────────
function mConflict(){
  const {conflictData:cd}=STATE;if(!cd)return'';
  const st=STAGES.find(s=>s.id===cd.task.stageId);
  return`<div class="mbk" id="mbk">
  <div class="mo" style="max-width:560px">
    <div class="mo-hdr">
      <span class="mo-ttl" style="color:var(--red)">⚠️ 更新競合 (HTTP 409)</span>
      <button class="mo-x" id="mc-x">×</button>
    </div>
    <div class="mo-body">
      <div class="cf-box">
        <div class="cf-ttl">🔒 楽観ロック競合を検知</div>
        <div style="font-size:12.5px;color:var(--txt2)">別端末が先に「${st?.name}」を更新しました。対処方法を選んでください。</div>
        <div class="cf-grid">
          <div class="cf-col"><div class="cf-cl">サーバー現在値</div>
            <div style="font-weight:700;color:var(--grn)">${ST_LABELS[cd.task.status]}</div>
            <div style="font-size:11px;color:var(--txt3)">version: ${cd.task.version}</div>
          </div>
          <div class="cf-col"><div class="cf-cl">あなたの変更</div>
            <div style="font-weight:700;color:var(--ylw)">${ST_LABELS[cd.attempted.status||cd.task.status]}</div>
            <div style="font-size:11px;color:var(--txt3)">version: ${cd.clientVer}</div>
          </div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-n" id="cf-reload" style="justify-content:flex-start">
          🔄 再読み込みして最新を確認<span style="margin-left:auto;font-size:11px;color:var(--grn)">推奨</span>
        </button>
        <button class="btn btn-y" id="cf-force" style="justify-content:flex-start">
          ⚡ 自分の変更で上書き保存<span style="margin-left:auto;font-size:11px;color:var(--red)">要注意</span>
        </button>
        <button class="btn btn-n" id="cf-cancel">✖ キャンセル（変更を破棄）</button>
      </div>
    </div>
  </div>
</div>`;
}

// ============================================================
// BIND ALL
// ============================================================
function bindAll(){
  const close=()=>setState({modal:null,selectedJob:null,selectedTask:null,conflictData:null,jobDetailTab:'flow'});

  // NAV / SIDEBAR
  const closeSidebar=()=>{if(isCompactViewport()&&STATE.sidebarOpen)setState({sidebarOpen:false});};
  document.getElementById('sb-toggle')?.addEventListener('click',()=>setState({sidebarOpen:!STATE.sidebarOpen}));
  document.getElementById('sb-backdrop')?.addEventListener('click',()=>setState({sidebarOpen:false}));
  document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>setState({view:b.dataset.view,listFilter:'all',masterTab:'stages',sidebarOpen:isCompactViewport()?false:STATE.sidebarOpen})));
  window.onresize=()=>{if(!isCompactViewport()&&STATE.sidebarOpen)setState({sidebarOpen:false});};
  document.getElementById('logout')?.addEventListener('click',()=>setState({user:null,view:'myview',sidebarOpen:false}));

  // KANBAN TOGGLE
  document.getElementById('kb-tog-scroll')?.addEventListener('click',()=>setState({kanbanMode:'scroll'}));
  document.getElementById('kb-tog-fit')?.addEventListener('click',()=>setState({kanbanMode:'fit'}));

  // QR BUTTON
  const openQR=()=>setState({modal:'qr',qrScanned:null});
  document.getElementById('qr-btn')?.addEventListener('click',openQR);
  document.getElementById('qr-btn-cust')?.addEventListener('click',openQR);

  // OPEN JOB
  document.querySelectorAll('[data-ojob]').forEach(el=>el.addEventListener('click',()=>{
    const j=STATE.jobs.find(j=>j.id===el.dataset.ojob);
    if(j)setState({selectedJob:j,modal:'jobDetail',jobDetailTab:'flow'});
  }));

  // OPEN TASK
  document.querySelectorAll('[data-otask]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const [jid,tid]=el.dataset.otask.split('__');
    const j=STATE.jobs.find(j=>j.id===jid);const t=j?.tasks.find(t=>t.id===tid);
    if(j&&t)setState({selectedJob:j,selectedTask:t,modal:'task'});
  }));

  // QUICK DONE
  document.querySelectorAll('[data-qdone]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const [jid,tid]=el.dataset.qdone.split('__');
    const j=STATE.jobs.find(j=>j.id===jid);const t=j?.tasks.find(t=>t.id===tid);
    if(!j||!t)return;
    if(updateTask(jid,tid,{status:'completed',completedAt:new Date().toISOString()},t.version))
      showToast('工程を完了しました');
  }));

  // QUICK HOLD
  document.querySelectorAll('[data-qhold]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const [jid,tid]=el.dataset.qhold.split('__');
    const j=STATE.jobs.find(j=>j.id===jid);const t=j?.tasks.find(t=>t.id===tid);
    if(j&&t)setState({selectedJob:j,selectedTask:t,modal:'task'});
  }));

  // FILTER
  document.querySelectorAll('[data-fl]').forEach(b=>b.addEventListener('click',()=>setState({listFilter:b.dataset.fl})));
  document.querySelectorAll('[data-period]').forEach(b=>b.addEventListener('click',()=>setState({listPeriod:b.dataset.period})));
  document.querySelectorAll('[data-dash-period]').forEach(b=>b.addEventListener('click',()=>setState({dashboardPeriod:b.dataset.dashPeriod})));
  document.getElementById('list-upstream')?.addEventListener('change',e=>setState({listUpstream:e.target.value}));
  document.getElementById('list-sort')?.addEventListener('change',e=>setState({listSort:e.target.value}));
  document.getElementById('cust-upstream')?.addEventListener('change',e=>setState({customerUpstream:e.target.value}));
  document.getElementById('list-date-from')?.addEventListener('change',e=>setState({listPeriod:'custom',listDateFrom:e.target.value}));
  document.getElementById('list-date-to')?.addEventListener('change',e=>setState({listPeriod:'custom',listDateTo:e.target.value}));

  // NEW JOB
  document.getElementById('new-job-btn')?.addEventListener('click',()=>setState({modal:'newJob'}));

  // MASTER TABS
  document.querySelectorAll('[data-mtab]').forEach(b=>b.addEventListener('click',()=>setState({masterTab:b.dataset.mtab})));

  // WIP SETTINGS
  document.getElementById('wip-save-btn')?.addEventListener('click',()=>{
    const next={...STATE.wipLimits};
    let hasError=false;
    document.querySelectorAll('[data-wip-input]').forEach(input=>{
      const val=parseInt(input.value,10);
      if(Number.isNaN(val)||val<1){
        input.style.borderColor='var(--red)';
        hasError=true;
        return;
      }
      input.style.borderColor='';
      next[input.dataset.wipInput]=val;
    });
    if(hasError){showToast('WIP上限は1以上の整数で入力してください','e');return;}
    setState({wipLimits:next,masterTab:'wip'});
    showToast('WIP上限を更新しました');
  });
  document.getElementById('wip-reset-btn')?.addEventListener('click',()=>{
    setState({wipLimits:{...DEFAULT_WIP_LIMITS},masterTab:'wip'});
    showToast('WIP上限を初期値に戻しました','i');
  });

  document.getElementById('upstream-save-btn')?.addEventListener('click',()=>{
    const vals=[...document.querySelectorAll('[data-upstream-input]')].map((i,idx)=>({
      name:i.value.trim(),
      color:document.querySelector(`[data-upstream-color="${idx}"]`)?.value||'#1d4ed8'
    })).filter(v=>v.name);
    const extra=document.getElementById('upstream-new')?.value.trim();
    const extraColor=document.getElementById('upstream-new-color')?.value||'#1d4ed8';
    if(extra)vals.push({name:extra,color:extraColor});
    const seen=new Set();
    const unique=vals.filter(v=>{if(seen.has(v.name))return false;seen.add(v.name);return true;});
    if(unique.length===0){showToast('元受けを1件以上入力してください','e');return;}
    setState({upstreams:unique,masterTab:'upstreams'});
    showToast('元受けマスタを更新しました');
  });
  document.getElementById('upstream-reset-btn')?.addEventListener('click',()=>{
    setState({upstreams:JSON.parse(JSON.stringify(DEFAULT_UPSTREAMS)),masterTab:'upstreams'});
    showToast('元受けマスタを初期値に戻しました','i');
  });
  document.getElementById('kpi-save-btn')?.addEventListener('click',()=>{
    const next=(STATE.kpiTargets||[]).map((row,idx)=>({
      ...row,
      salesTarget:parseInt(document.querySelector(`[data-kpi-sales="${idx}"]`)?.value||0,10)||0,
      profitTarget:parseInt(document.querySelector(`[data-kpi-profit="${idx}"]`)?.value||0,10)||0,
      countTarget:parseInt(document.querySelector(`[data-kpi-count="${idx}"]`)?.value||0,10)||0,
    }));
    setState({kpiTargets:next,masterTab:'kpi'});
    showToast('KPI目標を更新しました');
  });
  document.getElementById('kpi-reset-btn')?.addEventListener('click',()=>{
    setState({kpiTargets:buildDefaultKpiTargets(),masterTab:'kpi'});
    showToast('KPI目標を初期値に戻しました','i');
  });
  document.getElementById('user-save-btn')?.addEventListener('click',()=>{
    if(!['admin','manager'].includes(STATE.user?.role)){showToast('ユーザー権限を変更できません','e');return;}
    const next=getUsers().map((u,idx)=>({...u,role:document.querySelector(`[data-user-role="${idx}"]`)?.value||u.role}));
    const current=STATE.user?next.find(u=>u.id===STATE.user.id):null;
    setState({users:next,user:current||STATE.user,masterTab:'users'});
    showToast('ユーザー権限を更新しました');
  });

  // MODAL CLOSE
  document.getElementById('mc-x')?.addEventListener('click',close);
  document.getElementById('mc-x2')?.addEventListener('click',close);
  document.getElementById('mbk')?.addEventListener('click',e=>{if(e.target.id==='mbk')close();});

  // ── QR MODAL ──
  if(STATE.modal==='qr'){
    document.querySelectorAll('[data-qr-idx]').forEach(b=>b.addEventListener('click',()=>{
      const v=QR_DEMO_VEHICLES[parseInt(b.dataset.qrIdx)];
      setState({qrScanned:v,modal:'qr'});
      showToast(`${v.plate} を読み取りました`,'i');
    }));
    document.getElementById('qr-to-job')?.addEventListener('click',()=>setState({modal:'newJob'}));
    document.getElementById('qr-rescan')?.addEventListener('click',()=>setState({qrScanned:null,modal:'qr'}));
  }

  // ── TASK MODAL ──
  if(STATE.modal==='task'){
    const j=STATE.selectedJob,t=STATE.selectedTask;
    if(!j||!t)return;
    let curSt=t.status;
    const hl=()=>{
      document.querySelectorAll('.st-btn').forEach(b=>b.classList.toggle('sel',b.dataset.sst===curSt));
      const hb=document.getElementById('hold-block');
      if(hb)hb.style.display=curSt==='hold'?'block':'none';
    };
    hl();
    document.querySelectorAll('[data-sst]').forEach(b=>b.addEventListener('click',()=>{curSt=b.dataset.sst;hl();}));
    document.querySelectorAll('[data-dsc]').forEach(b=>b.addEventListener('click',()=>{const i=document.getElementById('eta-in');if(i)i.value=b.dataset.dsc;}));
    document.getElementById('insp-ok')?.addEventListener('click',()=>{curSt='completed';hl();document.getElementById('ng-block').style.display='none';});
    document.getElementById('insp-ng')?.addEventListener('click',()=>{curSt='hold';hl();document.getElementById('ng-block').style.display='block';});
    document.getElementById('t-save')?.addEventListener('click',()=>{
      const err=document.getElementById('mo-err');
      if(curSt==='hold'&&!document.getElementById('hr-sel').value){
        err.innerHTML='<div class="alert danger">⚠️ 保留理由を選択してください</div>';return;
      }
      const stage=STAGES.find(s=>s.id===t.stageId);
      if(stage?.code==='inspection'&&curSt==='hold'&&!document.getElementById('ng-sel')?.value){
        err.innerHTML='<div class="alert danger">⚠️ NG理由を選択してください</div>';return;
      }
      const changes={
        status:curSt,
        holdReasonId:curSt==='hold'?(document.getElementById('hr-sel')?.value||null):null,
        assigneeId:document.getElementById('ass-sel')?.value||null,
        finishEta:document.getElementById('eta-in')?.value||null,
        actualHours:parseFloat(document.getElementById('act-h')?.value)||null,
        note:document.getElementById('t-note')?.value||'',
        ngReasonId:document.getElementById('ng-sel')?.value||null,
        completedAt:curSt==='completed'?new Date().toISOString():null,
      };
      if(!canEdit(STATE.user,t,j)){err.innerHTML='<div class="alert danger">⚠️ この工程を変更する権限がありません</div>';return;}
      const ok=updateTask(j.id,t.id,changes,t.version);
      if(ok){setState({modal:null,selectedJob:null,selectedTask:null});showToast('工程を更新しました');}
    });
  }

  // ── JOB DETAIL TABS ──
  if(STATE.modal==='jobDetail'){
    document.querySelectorAll('[data-jdtab]').forEach(b=>b.addEventListener('click',()=>setState({jobDetailTab:b.dataset.jdtab,selectedJob:STATE.selectedJob})));
    document.querySelectorAll('[data-otask]').forEach(el=>el.addEventListener('click',e=>{
      e.stopPropagation();
      const [jid,tid]=el.dataset.otask.split('__');
      const j2=STATE.jobs.find(j=>j.id===jid);const t2=j2?.tasks.find(t=>t.id===tid);
      if(j2&&t2)setState({selectedJob:j2,selectedTask:t2,modal:'task'});
    }));
    document.getElementById('jf-save')?.addEventListener('click',()=>{
      const j2=STATE.selectedJob;if(!j2)return;
      if(!canEditFinance(STATE.user,j2)){showToast('財務情報を変更する権限がありません','e');return;}
      updateJob(j2.id,{
        estimateAmount:parseInt(document.getElementById('jf-sales')?.value||0,10)||0,
        estimatePartsCost:parseInt(document.getElementById('jf-parts')?.value||0,10)||0,
        estimateLaborCost:parseInt(document.getElementById('jf-labor')?.value||0,10)||0,
        settlementDate:document.getElementById('jf-settlement')?.value||j2.settlementDate||j2.promisedDelivery,
        frontOwnerId:(STATE.user?.role==='front'?STATE.user.id:(document.getElementById('jf-front')?.value||j2.frontOwnerId)),
        note:document.getElementById('jf-note')?.value||''
      });
      showToast('財務情報を更新しました');
    });
  }

  // ── NEW JOB ──
  if(STATE.modal==='newJob'){
    const showTmpl=()=>{
      const k=document.getElementById('nj-t')?.value;const tmpl=TEMPLATES[k];
      const el=document.getElementById('tmpl-st');
      if(el&&tmpl)el.textContent=tmpl.stages.map(id=>STAGES.find(s=>s.id===id)?.name).join(' → ');
    };
    document.getElementById('nj-t')?.addEventListener('change',showTmpl);
    showTmpl();
    document.querySelectorAll('.nj-pri').forEach(b=>{
      const pri=document.getElementById('nj-pri');
      if(b.dataset.pri===pri?.value)b.style.background='#dbeafe';
      b.addEventListener('click',()=>{
        document.querySelectorAll('.nj-pri').forEach(x=>x.style.background='');
        b.style.background='#dbeafe';
        if(pri)pri.value=b.dataset.pri;
      });
    });
    document.querySelectorAll('[data-dsc3]').forEach(b=>b.addEventListener('click',()=>{const i=document.getElementById('nj-d');if(i)i.value=b.dataset.dsc3;}));
    document.getElementById('nj-save')?.addEventListener('click',()=>{
      const c=document.getElementById('nj-c').value.trim();
      const v=document.getElementById('nj-v').value.trim();
      if(!c||!v){document.getElementById('nj-err').innerHTML='<div class="alert danger">⚠️ 顧客名と車両を入力してください</div>';return;}
      const tk=document.getElementById('nj-t').value;
      const tmpl=TEMPLATES[tk];
      const del=document.getElementById('nj-d').value;
      const est=parseInt(document.getElementById('nj-e').value)||0;
      const pri=document.getElementById('nj-pri').value;
      const upstream=document.getElementById('nj-up').value;
      const frontId=document.getElementById('nj-f').value;
      if(STATE.user?.role==='front'&&frontId!==STATE.user.id){document.getElementById('nj-err').innerHTML='<div class="alert danger">⚠️ フロントは自分の案件のみ登録できます</div>';return;}
      const settlementDate=document.getElementById('nj-sd').value||del;
      const newId='j'+Date.now();
      const num=String(20030+STATE.jobs.length+1);
      const tasks=tmpl.stages.map((sid,i)=>({
        id:`${newId}_t${i}`,jobId:newId,stageId:sid,sequence:i,
        status:i===0?'ready':'pending',assigneeId:null,finishEta:addD(today,i+1),
        holdReasonId:null,ngReasonId:null,reworkCount:0,note:'',version:1,completedAt:null,
      }));
      const nj={id:newId,jobNumber:`#${num}`,customerName:c,vehicleName:v,upstream,priority:pri,
        entryDate:isoDate(today),promisedDelivery:del,settlementDate,frontOwnerId:frontId,createdBy:STATE.user?.id||frontId,internalDeadline:addD(del,-1),
        estimateAmount:est,estimatePartsCost:Math.floor(est*.25),estimateLaborCost:Math.floor(est*.2),
        actualAmount:null,settlementStatus:'unsettled',status:'open',version:1,note:'',tasks};
      setState({jobs:[nj,...STATE.jobs],modal:null,qrScanned:null});
      showToast(`案件 #${num} を登録しました`);
    });
  }

  // ── CONFLICT ──
  if(STATE.modal==='conflict'){
    document.getElementById('cf-reload')?.addEventListener('click',()=>{
      setState({modal:null,conflictData:null,selectedJob:null,selectedTask:null});
      showToast('最新データに更新しました','i');
    });
    document.getElementById('cf-force')?.addEventListener('click',()=>{
      const {conflictData:cd,selectedJob:j,selectedTask:t}=STATE;
      if(!cd||!j||!t)return;
      const jobs=STATE.jobs.map(jb=>{
        if(jb.id!==j.id)return jb;
        return{...jb,tasks:jb.tasks.map(tk=>{
          if(tk.id!==t.id)return tk;
          return{...tk,...cd.attempted,version:tk.version+1};
        })};
      });
      setState({jobs,modal:null,conflictData:null,selectedJob:null,selectedTask:null});
      showToast('上書き保存しました','i');
    });
    document.getElementById('cf-cancel')?.addEventListener('click',()=>
      setState({modal:null,conflictData:null,selectedJob:null,selectedTask:null}));
  }
}

// ============================================================
// BOOT
// ============================================================
render();
</script>
</body>
</html>
