<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ams PRO v2.3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f3f7;--bg2:#ffffff;--bg3:#f5f7fa;--sur:#ffffff;--sur2:#f8f9fc;
  --bdr:#dde3ec;--bdr2:#b8c4d4;--txt:#1a2133;--txt2:#4a5872;--txt3:#8496ae;
  --acc:#1a56db;--acc2:#2563eb;--grn:#047857;--grn2:#059669;
  --ylw:#b45309;--org:#c2410c;--red:#b91c1c;--pur:#6d28d9;--cyn:#0e7490;
  --hp:#0e7490;--hp2:#0891b2;
  --bp:#1a56db;--bp2:#2563eb;
  --font:'Noto Sans JP',sans-serif;--mono:'JetBrains Mono',monospace;
  --r6:6px;--r8:8px;--r10:10px;--r12:12px;--r16:16px;
  --sh:0 4px 20px rgba(0,0,0,.09);--sh2:0 1px 6px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
button{cursor:pointer;font-family:var(--font)}
input,select,textarea{font-family:var(--font);outline:none;border:1px solid var(--bdr);border-radius:var(--r6);padding:6px 10px;transition:all .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(26,86,219,.1)}

/* LAYOUT */
#app{display:flex;height:100vh;overflow:hidden}
.sb{width:210px;min-width:210px;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;z-index:20;box-shadow:2px 0 10px rgba(0,0,0,.06)}
.sb-logo{padding:16px;border-bottom:1px solid var(--bdr);background:linear-gradient(135deg,#1a56db 0%,#1e40af 100%)}
.sb-logo .brand{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.5px}
.sb-logo .ver{font-size:9px;color:rgba(255,255,255,.65);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-sec{font-size:9.5px;font-weight:700;color:var(--txt3);letter-spacing:.8px;text-transform:uppercase;padding:10px 10px 4px;margin-top:4px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r8);font-size:13px;font-weight:500;color:var(--txt2);background:none;border:none;width:100%;text-align:left;transition:all .14s;position:relative}
.nav-btn:hover{background:var(--bg3);color:var(--txt)}
.nav-btn.on{background:linear-gradient(135deg,rgba(26,86,219,.12),rgba(37,99,235,.06));color:var(--acc2)}
.nav-btn.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:55%;background:var(--acc);border-radius:0 2px 2px 0}
.nav-btn.hp-on{background:linear-gradient(135deg,rgba(14,116,144,.12),rgba(8,145,178,.06));color:var(--hp)}
.nav-btn.hp-on::before{background:var(--hp)}
.nav-btn.bp-on{background:linear-gradient(135deg,rgba(26,86,219,.12),rgba(37,99,235,.06));color:var(--bp)}
.nav-btn.bp-on::before{background:var(--bp)}
.nav-ico{font-size:15px;min-width:18px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;font-weight:700}
.sb-user{padding:11px 14px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:9px}
.u-av{width:30px;height:30px;border-radius:var(--r8);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.u-av.hp{background:linear-gradient(135deg,var(--hp),var(--cyn))}
.u-av.bp{background:linear-gradient(135deg,var(--acc),var(--pur))}
.u-av.all{background:linear-gradient(135deg,#374151,#1f2937)}
.u-nm{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u-rl{font-size:10px;color:var(--txt3)}
.logout{background:none;border:none;color:var(--txt3);font-size:16px;padding:4px;border-radius:4px;margin-left:auto;transition:color .15s}
.logout:hover{color:var(--red)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:50px;background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tb-title{font-size:14.5px;font-weight:700}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:7px}
.content{flex:1;overflow-y:auto;padding:18px}
.content.no-pad{padding:0;overflow:hidden}

/* BADGES & TAGS */
.bx{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.bx-r{background:rgba(185,28,28,.1);color:var(--red);border:1px solid rgba(185,28,28,.25)}
.bx-y{background:rgba(180,83,9,.1);color:var(--ylw);border:1px solid rgba(180,83,9,.25)}
.bx-g{background:rgba(4,120,87,.1);color:var(--grn);border:1px solid rgba(4,120,87,.25)}
.bx-b{background:rgba(26,86,219,.1);color:var(--acc);border:1px solid rgba(26,86,219,.25)}
.bx-n{background:rgba(132,150,174,.12);color:var(--txt2);border:1px solid var(--bdr)}
.div-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;vertical-align:middle;margin-right:3px}
.div-tag.hp{background:rgba(14,116,144,.15);color:var(--hp)}
.div-tag.bp{background:rgba(26,86,219,.15);color:var(--bp)}
.up-badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10.5px;font-weight:700;color:#fff;white-space:nowrap}

/* CARDS / KPI */
.card{background:#fff;border:1px solid var(--bdr);border-radius:var(--r12);padding:15px;box-shadow:var(--sh2);height:100%}
.card-t{font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:11px;display:flex;align-items:center;justify-content:space-between}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:11px;margin-bottom:18px}
.kpi{background:#fff;border:1px solid var(--bdr);border-radius:var(--r12);padding:14px 16px;box-shadow:var(--sh2);display:flex;flex-direction:column;justify-content:center}
.kpi-lbl{font-size:11px;color:var(--txt3);margin-bottom:5px;font-weight:600}
.kpi-val{font-size:28px;font-weight:900;font-family:var(--mono);line-height:1}
.kpi.bl .kpi-val{color:var(--acc2)}.kpi.gn .kpi-val{color:var(--grn)}
.kpi.yl .kpi-val{color:var(--ylw)}.kpi.rd .kpi-val{color:var(--red)}
.kpi.hp-c .kpi-val{color:var(--hp)}.kpi.bp-c .kpi-val{color:var(--bp)}
.kpi-sub{font-size:10px;color:var(--txt3);margin-top:6px;display:flex;align-items:center;gap:5px}
.kpi-bar-bg{height:4px;background:var(--bdr);border-radius:2px;flex:1;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:2px}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--r10);border:1px solid var(--bdr)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#eef2f8;color:var(--txt3);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;text-align:left;border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--bdr);color:var(--txt)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#eef4ff}
.td-m{font-family:var(--mono);font-size:12px;color:var(--acc2)}

/* KANBAN */
.kb-scroll-wrap{display:flex;gap:9px;overflow-x:auto;padding:14px;height:100%;align-items:flex-start}
.kb-col{min-width:210px;max-width:210px;background:#eceff4;border:1px solid var(--bdr);border-radius:var(--r10);display:flex;flex-direction:column;flex-shrink:0;min-height:200px}
.kb-col.drag-over{background:#dbeafe;border:2px dashed var(--acc2)}
.kb-hdr{padding:10px 12px;border-bottom:1px solid var(--bdr);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;color:var(--txt2);background:#e2e8f0;border-radius:var(--r10) var(--r10) 0 0}
.kb-hdr.wip-over{border-bottom-color:var(--red);color:var(--red);background:#fff0f0}
.kb-cnt{background:#fff;border:1px solid var(--bdr);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--txt2)}
.kb-cards{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 175px)}
.kb-card{background:#fff;border:1px solid var(--bdr);border-radius:var(--r8);padding:10px;cursor:grab;transition:box-shadow .2s;box-shadow:0 1px 3px rgba(0,0,0,.04);position:relative}
.kb-card:hover{border-color:var(--acc2);box-shadow:0 4px 12px rgba(26,86,219,.12)}
.kb-card:active{cursor:grabbing}
.kb-card.hold{border-left:4px solid var(--ylw);background:#fffdf5}
.kb-card.urg{border-left:4px solid var(--red);background:#fff8f8}
.kb-card.hp-card{border-left:4px solid var(--hp)}
.kb-card.bp-card{border-left:4px solid var(--bp)}
.kc-num{font-family:var(--mono);font-size:10px;color:var(--txt3);margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.kc-nm{font-size:12.5px;font-weight:700;margin-bottom:2px}
.kc-veh{font-size:11px;color:var(--txt2);margin-bottom:6px;display:flex;flex-direction:column}
.kc-veh-plate{font-weight:700;color:var(--txt);font-family:var(--mono)}
.kc-ft{display:flex;align-items:center;justify-content:space-between;border-top:1px dashed var(--bdr);padding-top:6px;margin-top:2px}
.kc-ass{font-size:10px;color:var(--txt3);font-weight:600}
.kc-day{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.kc-day.safe{background:rgba(4,120,87,.12);color:var(--grn)}
.kc-day.warn{background:rgba(180,83,9,.12);color:var(--ylw)}
.kc-day.over{background:rgba(185,28,28,.15);color:var(--red)}

/* STATUS BUTTONS */
.st-grp{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:10px 0}
.st-btn{padding:13px 4px;border-radius:var(--r8);font-size:11px;font-weight:700;border:2px solid transparent;cursor:pointer;transition:all .13s;text-align:center;background:none}
.st-btn.pending{border-color:var(--bdr2);color:var(--txt2)}.st-btn.pending.sel{background:#e2e8f0;border-color:var(--txt2)}
.st-btn.in_progress{border-color:var(--acc);color:var(--acc2)}.st-btn.in_progress.sel{background:#dbeafe}
.st-btn.completed{border-color:var(--grn);color:var(--grn)}.st-btn.completed.sel{background:#d1fae5}
.st-btn.hold{border-color:var(--red);color:var(--red)}.st-btn.hold.sel{background:#fee2e2}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:var(--r8);font-size:13px;font-weight:600;border:none;transition:all .13s;cursor:pointer;white-space:nowrap}
.btn-p{background:var(--acc);color:#fff}.btn-p:hover{background:#1e40af}
.btn-hp{background:var(--hp);color:#fff}.btn-hp:hover{background:#0e6280}
.btn-g{background:var(--grn);color:#fff}.btn-g:hover{background:#065f46}
.btn-y{background:var(--ylw);color:#fff}.btn-y:hover{background:#92400e}
.btn-r{background:var(--red);color:#fff}.btn-r:hover{background:#991b1b}
.btn-n{background:#fff;color:var(--txt2);border:1px solid var(--bdr)}.btn-n:hover{background:var(--bg3);color:var(--txt)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:var(--r6)}
.btn-lg{padding:14px 20px;font-size:14px;border-radius:var(--r10);min-width:120px}

/* FORMS / GRID */
.fg{margin-bottom:14px}
.flbl{display:block;font-size:11.5px;font-weight:600;color:var(--txt2);margin-bottom:5px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fi{width:100%;background:#fff;color:var(--txt);font-size:13px;}
textarea.fi{resize:vertical;min-height:75px}

/* MODAL */
.mbk{position:fixed;inset:0;background:rgba(30,40,70,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.mo{background:#fff;border:1px solid var(--bdr);border-radius:var(--r16);width:100%;max-width:720px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);display:flex;flex-direction:column}
.mo-hdr{padding:18px 22px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:#fff;flex-shrink:0}
.mo-ttl{font-size:16px;font-weight:700}
.mo-x{background:none;border:none;color:var(--txt3);font-size:22px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1;}
.mo-x:hover{color:var(--red)}
.mo-body{padding:22px;flex:1;overflow-y:auto}
.mo-ft{padding:14px 22px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px;background:#f8fafc;flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;z-index:300;padding:12px 20px;border-radius:var(--r10);font-weight:600;font-size:13px;box-shadow:var(--sh);transition:opacity 0.3s ease, transform 0.3s ease;transform:translateY(0);opacity:1}
.toast.hide{opacity:0;transform:translateY(10px)}
.toast.s{background:var(--grn);color:#fff}.toast.e{background:var(--red);color:#fff}.toast.i{background:var(--acc);color:#fff}

/* UTILS */
.alert{padding:10px 14px;border-radius:var(--r8);font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.alert.warn{background:rgba(180,83,9,.08);border:1px solid rgba(180,83,9,.2);color:var(--ylw)}
.alert.danger{background:rgba(185,28,28,.08);border:1px solid rgba(185,28,28,.2);color:var(--red)}
.alert.info{background:rgba(26,86,219,.08);border:1px solid rgba(26,86,219,.2);color:var(--acc2)}

/* LIST UNASSIGNED */
.tc{background:#fff;border:1px solid var(--bdr);border-radius:var(--r10);padding:12px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;box-shadow:var(--sh2);margin-bottom:8px}
.tc:hover{border-color:var(--acc2);background:#eff6ff}
.tc-st{min-width:80px;background:#f0f4ff;border-radius:var(--r6);padding:6px 8px;text-align:center}
.tc-info{flex:1;min-width:0}
.tc-job{font-size:13px;font-weight:700}
.tc-veh{font-size:11.5px;color:var(--txt2);margin-top:2px}

@media print{
  body *{visibility:hidden;}
  #print-area, #print-area *{visibility:visible;}
  #print-area{position:absolute;left:0;top:0;width:100%;}
  .no-print{display:none !important;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============================================================
// DATA & LOGIC STRUCTURE
// ============================================================

// BP Stages
const BP_STAGES=[
  {id:'bs1',code:'reservation',name:'予約',order:0,group:'受付',hrs:0,div:'bp'},
  {id:'bs2',code:'pickup',name:'引取り',order:1,group:'受付',hrs:1,div:'bp'},
  {id:'bs3',code:'checkin',name:'入庫受付',order:2,group:'受付',hrs:.5,div:'bp'},
  {id:'bs4',code:'estimate',name:'見積',order:3,group:'受付',hrs:1.5,div:'bp'},
  {id:'bs5',code:'agreement',name:'協定',order:4,group:'手配',hrs:2,div:'bp'},
  {id:'bs6',code:'parts_order',name:'部品手配',order:5,group:'手配',hrs:.5,div:'bp'},
  {id:'bs7',code:'instruction',name:'作業指示',order:6,group:'手配',hrs:.5,div:'bp'},
  {id:'bs8',code:'bankin',name:'板金',order:7,group:'作業',hrs:4,div:'bp'},
  {id:'bs9',code:'mechanical',name:'メカ作業',order:8,group:'作業',hrs:3,div:'bp'},
  {id:'bs10',code:'painting',name:'塗装',order:9,group:'作業',hrs:4,div:'bp'},
  {id:'bs11',code:'polishing',name:'磨き',order:10,group:'作業',hrs:1.5,div:'bp'},
  {id:'bs12',code:'carwash',name:'洗車',order:11,group:'品質',hrs:.5,div:'bp'},
  {id:'bs13',code:'inspection',name:'検査',order:12,group:'品質',hrs:1,div:'bp'},
  {id:'bs14',code:'billing',name:'清算',order:13,group:'完了',hrs:.5,div:'bp'},
  {id:'bs15',code:'delivery',name:'納車',order:14,group:'完了',hrs:.5,div:'bp'},
];

// HP Stages (Terminology updated)
const HP_STAGES=[
  {id:'hs1',code:'reservation',name:'予約',order:0,group:'受付',hrs:0,div:'hp'},
  {id:'hs2',code:'pickup',name:'引取り',order:1,group:'受付',hrs:1,div:'hp'},
  {id:'hs3',code:'checkin',name:'入庫受付',order:2,group:'受付',hrs:.5,div:'hp'},
  {id:'hs4',code:'estimate',name:'見積・作業指示',order:3,group:'受付',hrs:1,div:'hp'},
  {id:'hs5',code:'work',name:'作業',order:4,group:'作業',hrs:3,div:'hp'},
  {id:'hs6',code:'quality_check',name:'できばえ確認',order:5,group:'品質',hrs:.5,div:'hp'}, // Updated
  {id:'hs7',code:'shaken_insp',name:'検査（車検）',order:6,group:'品質',hrs:1,div:'hp'},
  {id:'hs8',code:'billing',name:'清算',order:7,group:'完了',hrs:.5,div:'hp'},
  {id:'hs9',code:'delivery',name:'納車',order:8,group:'完了',hrs:.5,div:'hp'},
];

const STAGES=[...BP_STAGES,...HP_STAGES];

// Relational DB Simulation
const CUSTOMERS_DB=[
  {id:'c1',name:'三田村 康雄',phone:'090-1111-2222'},
  {id:'c2',name:'前田 律子',phone:'080-3333-4444'},
  {id:'c3',name:'堀田 直行',phone:'090-5555-6666'},
  {id:'c4',name:'大野 紀子',phone:'070-7777-8888'}
];
const VEHICLES_DB=[
  {id:'v1',customerId:'c1',maker:'トヨタ',model:'プリウス',plate:'品川 530 す 1234'},
  {id:'v2',customerId:'c2',maker:'ホンダ',model:'フィット',plate:'練馬 330 む 1122'},
  {id:'v3',customerId:'c3',maker:'マツダ',model:'CX-5',plate:'品川 302 と 7890'},
  {id:'v4',customerId:'c4',maker:'ホンダ',model:'フリード',plate:'練馬 501 あ 5678'}
];

const USERS=[
  {id:'u1',name:'有松 真一',role:'admin',div:'all'},
  {id:'u2',name:'宮田 憲治',role:'manager',div:'bp'},
  {id:'u3',name:'田口 悟',role:'front',div:'bp'},
  {id:'u4',name:'岩﨑 茂',role:'worker',div:'bp'},
  {id:'u12',name:'鈴木 誠',role:'front',div:'hp'},
  {id:'u13',name:'高橋 浩二',role:'worker',div:'hp'},
  {id:'u16',name:'渡辺 剛',role:'driver',div:'all'}
];

// Removed 'ready' status
const ST_LABELS={pending:'未着手',in_progress:'作業中',completed:'完了',hold:'保留'};
const ST_COLORS={pending:'#64748b',in_progress:'#1d4ed8',completed:'#047857',hold:'#b91c1c'};
const PD_ST_LABELS={pending:'納引待ち',in_progress:'納引中',completed:'納引完了'};

const DEFAULT_UPSTREAMS=[
  {name:'NTS',color:'#1d4ed8'},{name:'自受け',color:'#047857'},
  {name:'ホンダMM',color:'#b45309'},{name:'関東マツダ',color:'#dc2626'}
];

// Helpers
const today=new Date();
const isoDate=d=>{const x=new Date(d);return isNaN(x)?'':x.toISOString().slice(0,10)};
const isoTime=d=>{const x=new Date(d);return isNaN(x)?'':x.toISOString().slice(11,16)};
const addD=(d,n)=>isoDate(new Date(new Date(d).getTime()+n*86400000));
const diffD=d=>d?Math.ceil((new Date(d.split('T')[0])-new Date(isoDate(today)))/86400000):null;
const fmtD=d=>d?new Date(d).toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(' 00:00',''):'—';

let STATE={
  user:USERS[0], view:'myview', kanbanMode:'scroll',
  jobs:[], upstreams:DEFAULT_UPSTREAMS,
  toast:null, toastTimer:null, modal:null, selectedJob:null
};

function setState(patch){ Object.assign(STATE,typeof patch==='function'?patch(STATE):patch); render(); }

function showToast(msg,type='s'){
  if(STATE.toastTimer) clearTimeout(STATE.toastTimer);
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.textContent=(type==='s'?'✅ ':type==='e'?'❌ ':'ℹ️ ')+msg;
  document.body.appendChild(el);
  const tId=setTimeout(()=>{
    el.classList.add('hide');
    setTimeout(()=>el.remove(),300);
  },3000);
  setState({toastTimer:tId});
}

// ── TRANSFER KANBAN (Strict Logic & Status) ─────────────────────────
function vTransferKanban(){
  // 予約=引取予定のみ。納車は引取完了以降でのみ出現
  const getTasks=(code)=>STATE.jobs.map(j=>{
    const t=j.tasks.find(t=>STAGES.find(s=>s.id===t.stageId)?.code===code);
    // 納車の場合、引取が完了していないならスキップ（論理的制御）
    if(code==='delivery'){
      const pk=j.tasks.find(x=>STAGES.find(s=>s.id===x.stageId)?.code==='pickup');
      if(pk && pk.status!=='completed') return null;
    }
    return t?{j,t}:null;
  }).filter(Boolean);

  const pickups=getTasks('pickup');
  const deliveries=getTasks('delivery');

  const mkCard=(item)=>{
    const d=item.j[item.t.stageId.includes('2')?'promisedPickup':'promisedDelivery']||item.j.promisedDelivery;
    const isPast=new Date(d)<today && item.t.status!=='completed';
    const stLbl=PD_ST_LABELS[item.t.status]||'未定';
    // 当日完了分は残すロジック（completedAtが今日なら表示）
    if(item.t.status==='completed' && item.t.completedAt!==isoDate(today)) return '';

    return `<div class="kb-card ${item.j.div==='hp'?'hp-card':'bp-card'}" data-ojob="${item.j.id}" draggable="true" ondragstart="drag(event)">
      <div class="kc-num">
        <span>${divTag(item.j.div)} ${item.j.customerName}</span>
        <span class="up-badge" style="background:${DEFAULT_UPSTREAMS.find(u=>u.name===item.j.upstream)?.color||'#000'}">${item.j.upstream}</span>
      </div>
      <div class="kc-veh"><span class="kc-veh-plate">${item.j.vehicleName.split('　')[1]||item.j.vehicleName}</span><span style="font-size:9px">${item.j.vehicleName.split('　')[0]}</span></div>
      <div class="kc-ft">
        <span class="kc-ass" style="color:${item.t.status==='completed'?'var(--grn)':'var(--txt3)'}">${stLbl}</span>
        <span class="kc-day ${isPast?'over':'safe'}">${fmtD(d)}</span>
      </div>
    </div>`;
  };

  return `<div class="kb-scroll-wrap">
    <div class="kb-col" ondragover="allowDrop(event)" ondrop="drop(event,'pickup')">
      <div class="kb-hdr">🚗 引取予定 (予約含む) <span class="kb-cnt">${pickups.length}</span></div>
      <div class="kb-cards">${pickups.map(mkCard).join('')}</div>
    </div>
    <div class="kb-col" ondragover="allowDrop(event)" ondrop="drop(event,'delivery')">
      <div class="kb-hdr">📦 納車予定 <span class="kb-cnt">${deliveries.length}</span></div>
      <div class="kb-cards">${deliveries.map(mkCard).join('')}</div>
    </div>
  </div>`;
}

// ── DRAG & DROP LOGIC ─────────────────────────────────
function allowDrop(ev){ ev.preventDefault(); ev.currentTarget.classList.add('drag-over');}
function drag(ev){ ev.dataTransfer.setData("jid", ev.currentTarget.dataset.ojob); }
function drop(ev, targetStageId){
  ev.preventDefault();
  document.querySelectorAll('.kb-col').forEach(c=>c.classList.remove('drag-over'));
  const jid=ev.dataTransfer.getData("jid");
  const job=STATE.jobs.find(j=>j.id===jid);
  if(!job) return;

  // 引取/納車の特殊マッピング
  let sId = targetStageId;
  if(targetStageId==='pickup' || targetStageId==='delivery'){
    const stageDef=STAGES.find(s=>s.code===targetStageId && s.div===job.div);
    if(stageDef) sId=stageDef.id;
  }

  // タスクの状態を更新（対象ステージを進行中/未着手に、それ以前を完了に）
  const stageIdx = STAGES.findIndex(s=>s.id===sId);
  job.tasks.forEach(t=>{
    const tIdx = STAGES.findIndex(s=>s.id===t.stageId);
    if(tIdx < stageIdx) { t.status='completed'; t.completedAt=isoDate(today); }
    else if(tIdx === stageIdx) { t.status='in_progress'; t.completedAt=null; }
    else { t.status='pending'; t.completedAt=null; }
  });
  setState({});
  showToast('工程を移動しました');
}

// ── ACTIONS ─────────────────────────────────
function bindEvents(){
  document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>setState({view:b.dataset.view})));
  document.getElementById('btn-new')?.addEventListener('click',()=>setState({modal:'newJob',newDiv:STATE.view.includes('hp')?'hp':'bp'}));
  
  // Job detail open
  document.querySelectorAll('[data-ojob]').forEach(el=>el.addEventListener('click',(e)=>{
    if(e.target.closest('.kb-card')) return; // ignore drag wrapper click if any
    const j=STATE.jobs.find(x=>x.id===el.dataset.ojob);
    if(j) setState({modal:'jobDetail',selectedJob:j});
  }));

  // PDF Print Logic
  document.getElementById('btn-print-pd')?.addEventListener('click',()=>{
    const targets=STATE.jobs.filter(j=>j.tasks.some(t=>['pickup','delivery'].includes(STAGES.find(s=>s.id===t.stageId)?.code) && t.status!=='completed'));
    // 元請けソート
    targets.sort((a,b)=>(a.upstream||'').localeCompare(b.upstream||''));
    
    let html = `<h2>🚗 引取・納車リスト (${isoDate(today)})</h2><table border="1" style="width:100%;border-collapse:collapse;font-size:12px;text-align:left">
      <tr><th>元請け</th><th>顧客</th><th>車両/ナンバー</th><th>区分</th><th>予定日時</th></tr>`;
    targets.forEach(j=>{
      const t = j.tasks.find(t=>['pickup','delivery'].includes(STAGES.find(s=>s.id===t.stageId)?.code));
      const code = STAGES.find(s=>s.id===t.stageId)?.code;
      const d = code==='pickup'?j.promisedPickup:j.promisedDelivery;
      html += `<tr><td>${j.upstream}</td><td>${j.customerName}</td><td>${j.vehicleName}</td><td>${code==='pickup'?'引取':'納車'}</td><td>${fmtD(d)}</td></tr>`;
    });
    html += `</table>`;
    
    const printWindow = window.open('','_blank');
    printWindow.document.write(`<html><head><title>引取納車リスト</title><style>body{font-family:sans-serif;padding:20px} th,td{padding:8px}</style></head><body>${html}</body></html>`);
    printWindow.document.close();
    printWindow.focus();
    setTimeout(()=>printWindow.print(), 500);
  });
}

function saveNewJob(){
  const cid=document.getElementById('nj-cust').value;
  const cname=cid?CUSTOMERS_DB.find(c=>c.id===cid).name:'新規顧客';

  const up=document.getElementById('nj-up').value;
  const ass=document.getElementById('nj-ass').value;
  const pk=document.getElementById('nj-pickup').value;
  const dl=document.getElementById('nj-deliv').value;
  
  const div=STATE.newDiv;
  const stages=div==='bp'?BP_STAGES:HP_STAGES;
  const tasks=stages.map(s=>({id:`n_${Date.now()}_${s.id}`,stageId:s.id,status:'pending',assigneeId:ass,completedAt:null}));
  
  STATE.jobs.push({
    id:`j${Date.now()}`,jobNumber:`#${div==='hp'?'3':'2'}0099`,customerName:cname,vehicleName:veh,div,priority:'normal',
    upstream:up,entryDate:isoDate(today),promisedPickup:pk,promisedDelivery:dl,tasks
  });
  setState({modal:null});
  showToast('受付を登録しました');
}

// Boot
initData();
render();
